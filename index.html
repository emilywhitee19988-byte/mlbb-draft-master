<script>
  let heroesData = [];
  let allyPicks = [];
  let enemyPicks = [];
  let addMode = 0;
  let dataLoaded = false;

  const API_URL = 'https://mlbb-stats.rone.dev/api/heroes/rank';

  function escapeHtml(str) {
    return String(str ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function safeNum(value, fallback = 0) {
    const n = Number(value);
    return Number.isFinite(n) ? n : fallback;
  }

  function updateLastUpdated(message = null, isError = false) {
    const el = document.getElementById('last-updated');
    if (message) {
      el.innerHTML = isError
        ? `❌ ${message}`
        : `✅ ${message}`;
      return;
    }
    el.innerHTML = `✅ Live • ${new Date().toLocaleTimeString()}`;
  }

  async function fetchData() {
    const loadingEl = document.getElementById('last-updated');
    loadingEl.innerHTML = `<i class="fas fa-sync fa-spin"></i> Fetching live ranked data...`;

    try {
      const res = await fetch(API_URL, {
        method: 'GET',
        headers: { 'Accept': 'application/json' },
        cache: 'no-store'
      });

      if (!res.ok) {
        throw new Error(`Request failed with status ${res.status}`);
      }

      const json = await res.json();
      const records = json?.data?.records;

      if (!Array.isArray(records)) {
        throw new Error('Invalid API response: data.records missing');
      }

      const parsedHeroes = records.map((record) => {
        const inner = record?.data;
        const hero = inner?.main_hero?.data;

        if (!inner || !hero?.name) {
          return null;
        }

        const rawWin = safeNum(inner?.main_hero_win_rate, 0);
        const rawPick = safeNum(inner?.main_hero_appearance_rate, 0);
        const rawBan = safeNum(inner?.main_hero_ban_rate, 0);

        return {
          name: String(hero.name),
          image: hero.head || '',
          winRate: (rawWin * 100).toFixed(1),
          pickRate: (rawPick * 100).toFixed(1),
          banRate: (rawBan * 100).toFixed(1),
          rawWin,
          rawPick,
          rawBan
        };
      }).filter(Boolean);

      if (!parsedHeroes.length) {
        throw new Error('No heroes were parsed from the API');
      }

      heroesData = parsedHeroes.sort((a, b) => a.name.localeCompare(b.name));
      dataLoaded = true;

      renderTierTable(heroesData);
      renderSlots();
      renderHeroPool();
      renderRecommendations();
      updateLastUpdated();
    } catch (error) {
      console.error('fetchData error:', error);
      dataLoaded = false;
      heroesData = [];

      document.getElementById('hero-table').innerHTML = `
        <tr>
          <td colspan="5" class="text-center py-8 text-red-400">
            Failed to load hero stats
          </td>
        </tr>
      `;

      document.getElementById('hero-pool').innerHTML = `
        <p class="col-span-full text-red-400 text-center py-8">
          Failed to load hero pool
        </p>
      `;

      document.getElementById('recommendations').innerHTML = `
        <p class="text-red-400 text-center py-8">
          Failed to load recommendations
        </p>
      `;

      renderSlots();
      updateLastUpdated(error.message || 'Failed to load live data', true);
    }
  }

  function getTier(rawWin) {
    if (rawWin >= 0.55) return { label: 'S+', color: 'text-emerald-400' };
    if (rawWin >= 0.53) return { label: 'S', color: 'text-yellow-400' };
    if (rawWin >= 0.51) return { label: 'A', color: 'text-amber-400' };
    return { label: 'B', color: 'text-gray-300' };
  }

  function renderTierTable(data) {
    const tbody = document.getElementById('hero-table');

    if (!Array.isArray(data) || !data.length) {
      tbody.innerHTML = `
        <tr>
          <td colspan="5" class="text-center py-8 text-gray-400">
            No hero data available
          </td>
        </tr>
      `;
      return;
    }

    tbody.innerHTML = data.map((hero) => {
      const tier = getTier(hero.rawWin);

      return `
        <tr class="border-b border-gray-800 hover:bg-gray-800">
          <td class="pl-6 py-3">
            <div class="flex items-center gap-3">
              <img src="${escapeHtml(hero.image)}" class="hero-img rounded-lg" alt="${escapeHtml(hero.name)}">
              <span>${escapeHtml(hero.name)}</span>
            </div>
          </td>
          <td class="font-mono">${hero.winRate}% <span class="${tier.color}">▲</span></td>
          <td class="font-mono text-blue-400">${hero.pickRate}%</td>
          <td class="font-mono text-red-400">${hero.banRate}%</td>
          <td class="text-right pr-6">
            <span class="px-5 py-1 text-xs font-bold rounded-2xl bg-gray-800 ${tier.color}">
              ${tier.label}
            </span>
          </td>
        </tr>
      `;
    }).join('');
  }

  function sortTierTable(column) {
    const sorted = [...heroesData].sort((a, b) => {
      if (column === 1) return b.rawWin - a.rawWin;
      if (column === 2) return b.rawPick - a.rawPick;
      if (column === 3) return b.rawBan - a.rawBan;
      return a.name.localeCompare(b.name);
    });

    renderTierTable(sorted);
  }

  function filterTierTable() {
    const term = document.getElementById('search-tier').value.trim().toLowerCase();
    const filtered = heroesData.filter((hero) =>
      hero.name.toLowerCase().includes(term)
    );
    renderTierTable(filtered);
  }

  function setAddMode(mode) {
    addMode = mode;
    document.querySelectorAll('.add-mode-btn').forEach((button, index) => {
      button.style.opacity = index === mode ? '1' : '0.5';
    });
  }

  function buildSlotCard(hero, team, index, borderClass) {
    return `
      <div onclick="showBuildModal(${index}, ${team})"
           class="slot bg-gray-800 rounded-2xl p-3 text-center cursor-pointer border-2 ${borderClass}">
        <img src="${escapeHtml(hero.image)}" class="hero-img mx-auto" alt="${escapeHtml(hero.name)}">
        <p class="text-xs mt-1">${escapeHtml(hero.name)}</p>
        <span onclick="event.stopPropagation(); removePick(${team}, ${index});"
              class="text-red-400 text-xs cursor-pointer">
          ✕
        </span>
      </div>
    `;
  }

  function buildEmptySlots(count) {
    return Array(count).fill(`
      <div class="slot bg-gray-900 border-2 border-dashed border-gray-600 rounded-2xl p-6 text-center text-gray-400 text-sm">
        Empty slot
      </div>
    `);
  }

  function renderSlots() {
    const allyHtml = allyPicks
      .map((hero, index) => buildSlotCard(hero, 0, index, 'border-emerald-500'))
      .concat(buildEmptySlots(5 - allyPicks.length));

    const enemyHtml = enemyPicks
      .map((hero, index) => buildSlotCard(hero, 1, index, 'border-red-500'))
      .concat(buildEmptySlots(5 - enemyPicks.length));

    document.getElementById('ally-slots').innerHTML = allyHtml.join('');
    document.getElementById('enemy-slots').innerHTML = enemyHtml.join('');
  }

  function renderHeroPool() {
    const poolEl = document.getElementById('hero-pool');

    if (!dataLoaded) {
      poolEl.innerHTML = `
        <p class="col-span-full text-yellow-400 text-center py-12 flex items-center justify-center gap-2">
          <i class="fas fa-spinner fa-spin"></i> Loading heroes...
        </p>
      `;
      return;
    }

    const term = (document.getElementById('search-draft').value || '').trim().toLowerCase();
    const pickedNames = new Set([...allyPicks, ...enemyPicks].map((hero) => hero.name));

    const filtered = heroesData.filter((hero) => {
      return !pickedNames.has(hero.name) && hero.name.toLowerCase().includes(term);
    });

    if (!filtered.length) {
      poolEl.innerHTML = `
        <p class="col-span-full text-gray-400 text-center py-8">
          No heroes match or all heroes are already picked
        </p>
      `;
      return;
    }

    poolEl.innerHTML = filtered.map((hero) => `
      <div onclick='addHeroToTeam(${JSON.stringify(hero.name)})'
           class="bg-gray-800 hover:bg-gray-700 rounded-2xl p-2 flex flex-col items-center cursor-pointer">
        <img src="${escapeHtml(hero.image)}" class="hero-img" alt="${escapeHtml(hero.name)}">
        <p class="text-xs mt-2 text-center">${escapeHtml(hero.name)}</p>
      </div>
    `).join('');
  }

  function addHeroToTeam(heroName) {
    if (!dataLoaded) return;

    const hero = heroesData.find((h) => h.name === heroName);
    if (!hero) return;

    const alreadyPicked = [...allyPicks, ...enemyPicks].some((h) => h.name === hero.name);
    if (alreadyPicked) return;

    if (addMode === 0) {
      if (allyPicks.length >= 5) {
        alert('Your team is full!');
        return;
      }
      allyPicks.push(hero);
    } else {
      if (enemyPicks.length >= 5) {
        alert('Enemy team is full!');
        return;
      }
      enemyPicks.push(hero);
    }

    renderSlots();
    renderHeroPool();
    renderRecommendations();
  }

  function removePick(team, index) {
    if (team === 0) {
      allyPicks.splice(index, 1);
    } else {
      enemyPicks.splice(index, 1);
    }

    renderSlots();
    renderHeroPool();
    renderRecommendations();
  }

  function scoreHero(hero) {
    let score = hero.rawWin;

    const allyNames = allyPicks.map((h) => h.name.toLowerCase());
    const enemyNames = enemyPicks.map((h) => h.name.toLowerCase());

    if (allyNames.length) {
      score += 0.002 * Math.min(allyNames.length, 5);
    }

    if (enemyNames.length) {
      score += 0.001 * Math.min(enemyNames.length, 5);
    }

    return score;
  }

  function renderRecommendations() {
    const recEl = document.getElementById('recommendations');

    if (!dataLoaded) {
      recEl.innerHTML = `
        <p class="text-yellow-400 text-center py-8 flex items-center justify-center gap-2">
          <i class="fas fa-spinner fa-spin"></i> Loading optimal picks...
        </p>
      `;
      return;
    }

    const pickedNames = new Set([...allyPicks, ...enemyPicks].map((hero) => hero.name));

    const available = heroesData.filter((hero) => !pickedNames.has(hero.name));
    const sorted = [...available]
      .sort((a, b) => scoreHero(b) - scoreHero(a))
      .slice(0, 8);

    if (!sorted.length) {
      recEl.innerHTML = `
        <p class="text-gray-400 text-center py-8">
          All heroes are picked
        </p>
      `;
      return;
    }

    let html = `
      <p class="text-xs text-gray-400 mb-3">
        Based on current live win rate and open draft slots
      </p>
    `;

    html += sorted.map((hero) => `
      <div onclick='addHeroToTeam(${JSON.stringify(hero.name)})'
           class="flex gap-3 bg-gray-800 hover:bg-gray-700 rounded-2xl p-3 mb-2 cursor-pointer">
        <img src="${escapeHtml(hero.image)}" class="hero-img" alt="${escapeHtml(hero.name)}">
        <div class="flex-1">
          <div class="font-semibold">${escapeHtml(hero.name)}</div>
          <div class="text-emerald-400 text-sm">${hero.winRate}% WR • strong current meta pick</div>
        </div>
      </div>
    `).join('');

    recEl.innerHTML = html;
  }

  function showBuildModal(index, team) {
    const hero = team === 0 ? allyPicks[index] : enemyPicks[index];
    if (!hero) return;

    document.getElementById('modal-hero-name').textContent = `${hero.name} • Sample Optimal Build`;

    const items = [
      { name: 'Demon Hunter Sword', icon: '🗡️' },
      { name: 'Golden Staff', icon: '⚡' },
      { name: 'Malefic Roar', icon: '🔥' },
      { name: 'Blade of Despair', icon: '💀' },
      { name: 'Endless Battle', icon: '⚔️' },
      { name: 'Immortality', icon: '🛡️' }
    ];

    document.getElementById('modal-build').innerHTML = items.map((item) => `
      <div class="text-center">
        <div class="text-4xl mb-1">${item.icon}</div>
        <p class="text-xs">${escapeHtml(item.name)}</p>
      </div>
    `).join('');

    document.getElementById('build-modal').classList.remove('hidden');
  }

  function hideBuildModal() {
    document.getElementById('build-modal').classList.add('hidden');
  }

  function switchTab(tabIndex) {
    document.querySelectorAll('#content-0, #content-1').forEach((el) => {
      el.classList.add('hidden');
    });

    document.getElementById(`content-${tabIndex}`).classList.remove('hidden');

    document.querySelectorAll('.tab-button').forEach((button, index) => {
      button.classList.toggle('border-yellow-400', index === tabIndex);
      button.classList.toggle('text-yellow-400', index === tabIndex);
    });

    if (tabIndex === 1) {
      renderSlots();
      renderHeroPool();
      renderRecommendations();
    }
  }

  window.onload = () => {
    renderSlots();
    setAddMode(0);
    fetchData();
  };
</script>
