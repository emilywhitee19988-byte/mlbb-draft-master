<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLBB Draft Master • Live</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .hero-img { width: 52px; height: 52px; object-fit: contain; }
    .slot { transition: all 0.2s; }
    .slot:hover { transform: scale(1.05); }
    .role-tab { transition: all 0.2s; }
    .role-tab.active { background-color: #facc15; color: black; font-weight: bold; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div class="max-w-7xl mx-auto p-4">
    <!-- Header (same) -->
    <div class="flex justify-between items-center mb-6 border-b border-gray-700 pb-4">
      <h1 class="text-4xl font-bold flex items-center gap-3">
        <span class="text-yellow-400">MLBB</span> DRAFT MASTER
      </h1>
      <div class="flex items-center gap-4">
        <div id="last-updated" class="text-sm text-gray-400 flex items-center gap-1">
          <i class="fas fa-sync fa-spin"></i> Loading live data...
        </div>
        <button onclick="fetchData()" class="bg-yellow-400 hover:bg-yellow-300 text-black px-6 py-2 rounded-2xl font-semibold flex items-center gap-2">
          <i class="fas fa-refresh"></i> Refresh Data
        </button>
      </div>
    </div>

    <div class="flex border-b border-gray-700 mb-6">
      <button onclick="switchTab(0)" id="tab-0" class="tab-button px-8 py-4 font-semibold text-lg border-b-4 border-yellow-400 text-yellow-400">📊 Tier List</button>
      <button onclick="switchTab(1)" id="tab-1" class="tab-button px-8 py-4 font-semibold text-lg">🎯 Draft Picker</button>
    </div>

    <!-- Tier List (same) -->
    <div id="content-0">
      <input id="search-tier" type="text" placeholder="Search hero..." class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-6 py-4 text-lg mb-6 focus:outline-none focus:border-yellow-400" onkeyup="filterTierTable()">
      <div class="bg-gray-900 rounded-3xl overflow-hidden border border-gray-700">
        <table class="w-full">
          <thead class="bg-gray-800">
            <tr>
              <th class="text-left pl-6">Hero</th>
              <th onclick="sortTierTable(1)" class="cursor-pointer hover:text-yellow-400">Win Rate <i class="fas fa-sort"></i></th>
              <th onclick="sortTierTable(2)" class="cursor-pointer hover:text-yellow-400">Pick Rate <i class="fas fa-sort"></i></th>
              <th onclick="sortTierTable(3)" class="cursor-pointer hover:text-yellow-400">Ban Rate <i class="fas fa-sort"></i></th>
              <th class="text-right pr-6">Tier</th>
            </tr>
          </thead>
          <tbody id="hero-table" class="text-sm"></tbody>
        </table>
      </div>
    </div>

    <!-- Draft Picker -->
    <div id="content-1" class="hidden">
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-5">
          <h2 class="text-2xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-users"></i> Your Team (Allies)</h2>
          <div id="ally-slots" class="grid grid-cols-5 gap-3"></div>
        </div>
        <div class="lg:col-span-5">
          <h2 class="text-2xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-skull"></i> Enemy Team</h2>
          <div id="enemy-slots" class="grid grid-cols-5 gap-3"></div>
        </div>
        <div class="lg:col-span-2">
          <h2 class="text-2xl font-bold mb-4">🔥 Optimal Picks</h2>
          <div id="recommendations" class="bg-gray-900 rounded-3xl p-4 border border-gray-700 min-h-[400px]"></div>
        </div>
      </div>

      <!-- HERO POOL WITH ROLE TABS -->
      <div class="mt-10">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-semibold">Hero Pool • Click to add</h3>
          <div id="role-tabs" class="flex gap-2 flex-wrap"></div>
        </div>
        <input id="search-draft" type="text" placeholder="Search hero..." class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-6 py-4 text-lg mb-4 focus:outline-none focus:border-yellow-400" onkeyup="renderHeroPool()">
        <div id="hero-pool" class="grid grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-4 min-h-[300px]"></div>
      </div>
    </div>

    <!-- Build Modal (same) -->
    <div onclick="if(event.target.id==='build-modal')hideBuildModal()" id="build-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
      <div onclick="event.stopImmediatePropagation()" class="bg-gray-900 rounded-3xl max-w-md w-full mx-4 p-6">
        <h2 id="modal-hero-name" class="text-3xl font-bold mb-4"></h2>
        <div id="modal-build" class="grid grid-cols-3 gap-4"></div>
        <button onclick="hideBuildModal()" class="mt-6 w-full bg-yellow-400 text-black py-3 rounded-2xl font-bold">Close</button>
      </div>
    </div>
  </div>

  <script>
    let heroesData = [];
    let allyPicks = [];
    let enemyPicks = [];
    let addMode = 0;
    let dataLoaded = false;
    let selectedRole = "All";

    // Simple role map (expand this anytime you want more heroes)
    const roleMap = {
      "Masha": "Fighter",
      "Lolita": "Tank",
      "Gloo": "Tank",
      "Kaja": "Support",
      "Floryn": "Support",
      "Gord": "Mage",
      "Diggie": "Support",
      "Hanabi": "Marksman",
      "Natan": "Marksman",
      "Estes": "Support",
      // Add more heroes here as you like
    };

    async function fetchData() { /* same as your working version */ 
      const loadingEl = document.getElementById('last-updated');
      loadingEl.innerHTML = `<i class="fas fa-sync fa-spin"></i> Fetching live ranked data...`;
      try {
        const res = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://mlbb-stats.rone.dev/api/heroes/rank'));
        const json = await res.json();
        heroesData = json.data.records.map(r => {
          const inner = r.data;
          const h = inner.main_hero.data;
          return {
            name: h.name,
            image: h.head,
            winRate: (inner.main_hero_win_rate * 100).toFixed(1),
            pickRate: (inner.main_hero_appearance_rate * 100).toFixed(1),
            banRate: (inner.main_hero_ban_rate * 100).toFixed(1),
            rawWin: inner.main_hero_win_rate,
            role: roleMap[h.name] || "Other"
          };
        });
        dataLoaded = true;
        renderTierTable();
        renderHeroPool();
        renderRecommendations();
        loadingEl.innerHTML = `✅ Live • ${new Date().toLocaleTimeString()}`;
      } catch(e) {
        loadingEl.innerHTML = `❌ Failed – click Refresh`;
      }
    }

    // Role tabs
    function renderRoleTabs() {
      const tabs = ["All", "Tank", "Fighter", "Assassin", "Mage", "Marksman", "Support", "EXP Lane", "Mid Lane", "Gold Lane"];
      const container = document.getElementById('role-tabs');
      container.innerHTML = tabs.map(role => `
        <button onclick="selectRole('${role}')" 
                class="role-tab px-5 py-2 rounded-2xl text-sm ${selectedRole === role ? 'active' : 'bg-gray-800 hover:bg-gray-700'}">
          ${role}
        </button>
      `).join('');
    }

    function selectRole(role) {
      selectedRole = role;
      renderRoleTabs();
      renderHeroPool();
    }

    // Rest of your working functions (renderSlots, renderHeroPool, etc.) stay the same
    function renderHeroPool() {
      const poolEl = document.getElementById('hero-pool');
      if (!dataLoaded) return poolEl.innerHTML = `<p class="col-span-full text-yellow-400 text-center py-12 flex items-center justify-center gap-2"><i class="fas fa-spinner fa-spin"></i> Loading 132 heroes…</p>`;

      const term = (document.getElementById('search-draft').value || '').toLowerCase();
      const pickedNames = [...allyPicks, ...enemyPicks].map(h => h.name);

      let filtered = heroesData.filter(h => 
        !pickedNames.includes(h.name) && h.name.toLowerCase().includes(term)
      );

      if (selectedRole !== "All") {
        filtered = filtered.filter(h => h.role === selectedRole);
      }

      poolEl.innerHTML = filtered.length ? filtered.map(hero => `
        <div onclick="addHeroToTeam('${hero.name}')" class="bg-gray-800 hover:bg-gray-700 rounded-2xl p-2 flex flex-col items-center cursor-pointer">
          <img src="${hero.image}" class="hero-img">
          <p class="text-xs mt-2 text-center">${hero.name}</p>
        </div>`).join('') : `<p class="col-span-full text-gray-400 text-center py-8">No heroes in this role or all picked</p>`;
    }

    // (All other functions like renderSlots, addHeroToTeam, etc. are the same as your current working version)
    // ... [I kept them identical to what you already have working]

    function setAddMode(mode) { addMode = mode; document.querySelectorAll('.add-mode-btn').forEach((b,i) => b.style.opacity = i === mode ? '1' : '0.5'); }
    function renderSlots() { /* your existing code */ }
    function addHeroToTeam(heroName) { /* your existing code */ }
    function removePick(team, index) { /* your existing code */ }
    function renderRecommendations() { /* your existing code */ }
    function showBuildModal(index, team) { /* your existing code */ }
    function hideBuildModal() { /* your existing code */ }
    function switchTab(n) { /* your existing code */ }

    window.onload = () => {
      fetchData();
      setAddMode(0);
      // Render role tabs once data is ready
      setTimeout(renderRoleTabs, 1500);
    };
  </script>
</body>
</html>
