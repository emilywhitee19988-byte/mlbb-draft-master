<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOK English Guide - Complete Tier List & Counters</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    
    /* View management */
    .view {
      display: none;
    }
    
    .view.active {
      display: block;
    }
    
    /* Header */
    .header {
      text-align: center;
      margin-bottom: 40px;
      padding: 30px 20px;
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(59, 130, 246, 0.3);
    }
    
    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .header p {
      font-size: 1.1rem;
      color: #bfdbfe;
    }
    
    .patch-info {
      display: inline-block;
      margin-top: 15px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      font-size: 0.9rem;
      backdrop-filter: blur(10px);
    }
    
    /* Back Button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: rgba(30, 41, 59, 0.6);
      border: 2px solid #334155;
      border-radius: 10px;
      color: #e2e8f0;
      text-decoration: none;
      margin-bottom: 20px;
      transition: all 0.3s;
      cursor: pointer;
      border: none;
      font-size: 1rem;
    }
    
    .back-btn:hover {
      background: rgba(51, 65, 85, 0.8);
      border-color: #3b82f6;
    }
    
    /* Controls */
    .controls {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      background: rgba(30, 41, 59, 0.6);
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(148, 163, 184, 0.1);
    }
    
    .search-box {
      flex: 1;
      min-width: 250px;
    }
    
    .search-box input {
      width: 100%;
      padding: 12px 20px;
      border: 2px solid #334155;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.8);
      color: white;
      font-size: 1rem;
      transition: all 0.3s;
    }
    
    .search-box input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    
    .search-box input::placeholder {
      color: #64748b;
    }
    
    .filter-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .filter-btn {
      padding: 10px 20px;
      border: 2px solid #334155;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.8);
      color: #e2e8f0;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
      font-size: 0.9rem;
    }
    
    .filter-btn:hover {
      background: rgba(51, 65, 85, 0.8);
      border-color: #475569;
    }
    
    .filter-btn.active {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      border-color: #3b82f6;
      color: white;
    }
    
    /* Tier Section */
    .tier-section {
      margin-bottom: 30px;
      background: rgba(30, 41, 59, 0.4);
      border-radius: 15px;
      overflow: hidden;
      border: 2px solid rgba(148, 163, 184, 0.1);
    }
    
    .tier-header {
      padding: 15px 25px;
      font-size: 1.5rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .tier-s { background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%); }
    .tier-a { background: linear-gradient(135deg, #ea580c 0%, #f97316 100%); }
    .tier-b { background: linear-gradient(135deg, #eab308 0%, #facc15 100%); color: #0f172a; }
    .tier-c { background: linear-gradient(135deg, #22c55e 0%, #4ade80 100%); }
    
    .tier-content {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 15px;
    }
    
    /* Hero Card */
    .hero-card {
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      border: 2px solid #334155;
      border-radius: 12px;
      padding: 15px;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      position: relative;
    }
    
    .hero-card:hover {
      transform: translateY(-5px);
      border-color: #3b82f6;
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
    }
    
    .hero-avatar {
      width: 80px;
      height: 80px;
      margin: 0 auto 10px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
      background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
      border: 3px solid #475569;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    
    .hero-name-en {
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 3px;
      color: #f1f5f9;
    }
    
    .hero-name-alt {
      font-size: 0.75rem;
      color: #60a5fa;
      margin-bottom: 3px;
      font-style: italic;
    }
    
    .hero-name-cn {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    
    .hero-role {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-top: 5px;
    }
    
    /* Role Colors */
    .role-tank { background: #1e40af; color: white; }
    .role-fighter { background: #dc2626; color: white; }
    .role-assassin { background: #7c3aed; color: white; }
    .role-mage { background: #2563eb; color: white; }
    .role-marksman { background: #ea580c; color: white; }
    .role-support { background: #059669; color: white; }
    
    .hero-stats {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #334155;
      font-size: 0.75rem;
      color: #94a3b8;
    }
    
    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 3px;
    }
    
    /* Hero Detail styles - same as before */
    .hero-header {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      border-radius: 20px;
      padding: 40px;
      margin-bottom: 30px;
      box-shadow: 0 10px 40px rgba(59, 130, 246, 0.3);
    }
    
    .hero-header-content {
      display: flex;
      align-items: center;
      gap: 30px;
      flex-wrap: wrap;
    }
    
    .hero-avatar-large {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 5px solid rgba(255,255,255,0.2);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    
    .hero-info {
      flex: 1;
    }
    
    .hero-names {
      margin-bottom: 15px;
    }
    
    .hero-name-en-large {
      font-size: 2.5rem;
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    .hero-name-alt-large {
      font-size: 1.2rem;
      color: #60a5fa;
      font-style: italic;
      margin-bottom: 5px;
    }
    
    .hero-name-cn-large {
      font-size: 1.5rem;
      color: #bfdbfe;
    }
    
    .hero-meta {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    
    .meta-badge {
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9rem;
    }
    
    .tier-badge-s { background: #dc2626; }
    .tier-badge-a { background: #ea580c; }
    .tier-badge-b { background: #eab308; color: #0f172a; }
    .tier-badge-c { background: #22c55e; }
    .role-badge { background: rgba(255,255,255,0.2); }
    
    .hero-stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 20px;
    }
    
    .stat-box {
      background: rgba(0,0,0,0.2);
      padding: 12px;
      border-radius: 10px;
      text-align: center;
    }
    
    .stat-label {
      font-size: 0.8rem;
      color: #bfdbfe;
      margin-bottom: 5px;
    }
    
    .stat-value {
      font-size: 1.5rem;
      font-weight: bold;
    }
    
    .stat-value.good { color: #4ade80; }
    .stat-value.warning { color: #fbbf24; }
    
    /* Tab Navigation */
    .tab-nav {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      background: rgba(30, 41, 59, 0.6);
      padding: 10px;
      border-radius: 15px;
      overflow-x: auto;
    }
    
    .tab-btn {
      padding: 12px 24px;
      border: none;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      border-radius: 10px;
      font-weight: 600;
      transition: all 0.3s;
      white-space: nowrap;
    }
    
    .tab-btn:hover {
      background: rgba(51, 65, 85, 0.5);
      color: #e2e8f0;
    }
    
    .tab-btn.active {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
    }
    
    /* Tab Content */
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    /* Section Card */
    .section-card {
      background: rgba(30, 41, 59, 0.4);
      border: 2px solid rgba(148, 163, 184, 0.1);
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 20px;
    }
    
    .section-title {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    /* Lane Selector */
    .lane-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }
    
    .lane-btn {
      padding: 10px 20px;
      border: 2px solid #334155;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.8);
      color: #e2e8f0;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }
    
    .lane-btn:hover {
      border-color: #475569;
      background: rgba(51, 65, 85, 0.8);
    }
    
    .lane-btn.active {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      border-color: #3b82f6;
    }
    
    .lane-btn.primary {
      border-color: #22c55e;
    }
    
    /* Counter Sections */
    .counter-section {
      margin-bottom: 30px;
    }
    
    .counter-section-title {
      font-size: 1.1rem;
      font-weight: bold;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #334155;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .counter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
    }
    
    .counter-card {
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      border: 2px solid #334155;
      border-radius: 12px;
      padding: 15px;
      transition: all 0.3s;
      cursor: pointer;
    }
    
    .counter-card:hover {
      border-color: #3b82f6;
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(59, 130, 246, 0.2);
    }
    
    .counter-card.threat {
      border-left: 4px solid #ef4444;
    }
    
    .counter-card.advantage {
      border-left: 4px solid #22c55e;
    }
    
    .counter-hero-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    
    .counter-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
      border: 2px solid #475569;
    }
    
    .counter-names {
      flex: 1;
    }
    
    .counter-name-en {
      font-weight: bold;
      font-size: 1rem;
      margin-bottom: 2px;
    }
    
    .counter-name-cn {
      font-size: 0.85rem;
      color: #94a3b8;
    }
    
    .counter-tip {
      background: rgba(51, 65, 85, 0.5);
      padding: 10px;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #cbd5e1;
      line-height: 1.5;
    }
    
    .tip-icon {
      color: #fbbf24;
      margin-right: 5px;
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
    }
    
    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.8rem;
      }
      
      .controls {
        flex-direction: column;
      }
      
      .tier-content {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 10px;
      }
      
      .hero-card {
        padding: 12px;
      }
      
      .hero-avatar {
        width: 60px;
        height: 60px;
        font-size: 1.5rem;
      }
      
      .counter-grid {
        grid-template-columns: 1fr;
      }
      
      .hero-header {
        padding: 25px;
      }
      
      .hero-avatar-large {
        width: 80px;
        height: 80px;
        font-size: 2.5rem;
      }
      
      .hero-name-en-large {
        font-size: 1.8rem;
      }
    }
  
    
    /* === DRAFT SIMULATOR === */
    #view-draft { display: none; }
    #view-draft.active { display: block; }
    
    .tabs {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      border-bottom: 2px solid #334155;
    }
    
    .tab-btn {
      padding: 15px 30px;
      border: none;
      border-radius: 10px 10px 0 0;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .tab-btn.active {
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      color: white;
    }
    
    .tab-btn:not(.active) {
      background: #1e293b;
      color: #94a3b8;
    }
    
    .draft-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    
    .draft-panel {
      background: rgba(30, 41, 59, 0.6);
      padding: 20px;
      border-radius: 15px;
      border: 2px solid #334155;
    }
    
    .role-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 15px 0;
    }
    
    .role-btn {
      padding: 10px 20px;
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 8px;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }
    
    .role-btn:hover {
      border-color: #3b82f6;
    }
    
    .role-btn.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: white;
    }
    
    .hero-select {
      width: 100%;
      padding: 12px;
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      margin: 10px 0;
      font-size: 1rem;
    }
    
    @media (max-width: 768px) {
      .draft-grid {
        grid-template-columns: 1fr;
      }
    }
</style>
</head>
<body>
  <div class="container">
    <!-- TIER LIST VIEW -->
    <div id="view-tierlist" class="view active">
      <div class="header">
        <h1>🎮 HOK English Guide</h1>
        <p>Complete Hero List with Liquipedia + NA Names</p>
        <div class="patch-info">📊 80+ Heroes • Updated March 29, 2026</div>
      
      <!-- TABS - SIMPLE VERSION -->
      <div style="margin: 20px 0; text-align: center; background: #1e293b; padding: 15px; border-radius: 10px;">
        <button onclick="switchTab('tierlist')" style="padding: 15px 40px; margin: 0 10px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;">
          📊 TIER LIST
        </button>
        <button onclick="switchTab('draft')" style="padding: 15px 40px; margin: 0 10px; background: #10b981; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;">
          🎯 DRAFT SIMULATOR
        </button>
      </div>


            </div>

      <div class="controls">
        <div class="search-box">
          <input 
            type="text" 
            id="search-input" 
            placeholder="🔍 Search hero (any name or 中文)..."
            oninput="filterHeroes()"
          >
        </div>
        <div class="filter-buttons">
          <button class="filter-btn active" data-role="all" onclick="filterByRole('all')">All Roles</button>
          <button class="filter-btn" data-role="Tank" onclick="filterByRole('Tank')">Tank</button>
          <button class="filter-btn" data-role="Fighter" onclick="filterByRole('Fighter')">Fighter</button>
          <button class="filter-btn" data-role="Assassin" onclick="filterByRole('Assassin')">Assassin</button>
          <button class="filter-btn" data-role="Mage" onclick="filterByRole('Mage')">Mage</button>
          <button class="filter-btn" data-role="Marksman" onclick="filterByRole('Marksman')">Marksman</button>
          <button class="filter-btn" data-role="Support" onclick="filterByRole('Support')">Support</button>
        </div>
      </div>

      <div id="tier-container"></div>
    </div>

    <!-- HERO DETAIL VIEW -->
    <div id="view-herodetail" class="view">
      <button class="back-btn" onclick="showView('tierlist')">
        ← Back to Tier List
      </button>
      <div id="hero-detail-content"></div>

    <!-- DRAFT SIMULATOR VIEW -->
    <div id="view-draft" class="view">
      <div class="header">
        <h1>🎯 Draft Simulator</h1>
        <p>All 106 Global Heroes • Smart Counter Suggestions • Adaptive Build Advice</p>
      </div>
      
      <div class="draft-grid">
        <!-- Left Panel: Your Pick -->
        <div class="draft-panel">
          <h3 style="color: #e2e8f0; margin-bottom: 15px;">👤 Your Pick</h3>
          
          <label style="color: #94a3b8; font-size: 0.9rem;">Select your role:</label>
          <div class="role-buttons" id="role-buttons"></div>
          
          <div id="your-hero-select"></div>
        </div>
        
        <!-- Right Panel: Enemy Team -->
        <div class="draft-panel">
          <h3 style="color: #e2e8f0; margin-bottom: 15px;">⚔️ Enemy Team</h3>
          
          <select class="hero-select" id="enemy1" onchange="updateAnalysis()">
            <option value="">Enemy 1</option>
          </select>
          <select class="hero-select" id="enemy2" onchange="updateAnalysis()">
            <option value="">Enemy 2</option>
          </select>
          <select class="hero-select" id="enemy3" onchange="updateAnalysis()">
            <option value="">Enemy 3</option>
          </select>
          
          <!-- Counter Suggestions -->
          <div id="counter-suggestions" style="margin-top: 20px;"></div>
          
          <!-- Build Advice -->
          <div id="build-advice" style="margin-top: 20px;"></div>
        </div>
      </div>
    </div>
    </div>
  </div>

    // ============================================
    // AUTO-GENERATE COUNTERS FOR ALL HEROES
    // Based on role matchups and game mechanics
    // ============================================
    function generateCounters() {
      // Counter rules based on roles and characteristics
      const assassins = Object.values(HEROES).filter(h => h.role === 'Assassin').map(h => h.id);
      const mages = Object.values(HEROES).filter(h => h.role === 'Mage').map(h => h.id);
      const marksmen = Object.values(HEROES).filter(h => h.role === 'Marksman').map(h => h.id);
      const tanks = Object.values(HEROES).filter(h => h.role === 'Tank').map(h => h.id);
      const fighters = Object.values(HEROES).filter(h => h.role === 'Fighter').map(h => h.id);
      const supports = Object.values(HEROES).filter(h => h.role === 'Support').map(h => h.id);

      // Apply counter logic to each hero
      Object.values(HEROES).forEach(hero => {
        if (!hero.counters) {
          hero.counters = {};
        }

        const lanes = [hero.primaryLane.toLowerCase(), ...hero.viableLanes.map(l => l.toLowerCase())];
        
        lanes.forEach(lane => {
          if (!hero.counters[lane]) {
            const weak = [];
            const strong = [];

            // ASSASSINS counter immobile mages/marksmen
            if (hero.role === 'Assassin') {
              strong.push(...mages.filter(m => !['diaochan'].includes(m)).slice(0, 3));
              strong.push(...marksmen.filter(m => !['marcopolo'].includes(m)).slice(0, 2));
              weak.push(...tanks.slice(0, 2));
              weak.push(...supports.filter(s => ['donghuang', 'caiyan', 'yao'].includes(s)));
            }

            // MAGES counter tanks/fighters (poke)
            else if (hero.role === 'Mage') {
              strong.push(...tanks.slice(0, 2));
              strong.push(...fighters.filter(f => !['lam', 'augran'].includes(f)).slice(0, 2));
              weak.push(...assassins.slice(0, 3));
            }

            // MARKSMEN counter tanks (sustained DPS)
            else if (hero.role === 'Marksman') {
              strong.push(...tanks.slice(0, 2));
              strong.push(...fighters.slice(0, 2));
              weak.push(...assassins.slice(0, 4));
            }

            // TANKS counter assassins (peel)
            else if (hero.role === 'Tank') {
              strong.push(...assassins.slice(0, 3));
              weak.push(...mages.filter(m => ['daji', 'angela', 'ying'].includes(m)));
              weak.push(...marksmen.slice(0, 2));
            }

            // FIGHTERS - balanced matchups
            else if (hero.role === 'Fighter') {
              strong.push(...mages.slice(0, 2));
              strong.push(...marksmen.slice(0, 1));
              weak.push(...tanks.slice(0, 2));
              weak.push(...fighters.filter(f => ['lam', 'augran', 'machao'].includes(f)));
            }

            // SUPPORTS - utility based
            else if (hero.role === 'Support') {
              strong.push(...assassins.slice(0, 2));
              weak.push(...tanks.slice(0, 1));
              weak.push(...mages.filter(m => ['daji', 'angela'].includes(m)));
            }

            // Remove duplicates and self
            hero.counters[lane] = {
              weak: [...new Set(weak)].filter(id => id !== hero.id).slice(0, 4),
              strong: [...new Set(strong)].filter(id => id !== hero.id).slice(0, 4)
            };
          }
        });
      });
    }

    // Generate counters on load
    generateCounters();

    // Counter tips database
    const COUNTER_TIPS = {
      'default': 'Strong matchup based on role advantage.',
      'assassin_vs_mage': 'High mobility allows easy assassination of immobile mages.',
      'assassin_vs_marksman': 'Burst damage kills squishy marksmen before they can react.',
      'tank_vs_assassin': 'High HP and CC shuts down assassin burst combos.',
      'mage_vs_tank': 'Percent damage and poke wears down tanks over time.',
      'marksman_vs_tank': 'Sustained DPS shreds through tank HP.',
      'support_anti_burst': 'Healing and shields counter burst assassins.'
    };

    function getCounterTip(attackerId, defenderId) {
      const attacker = HEROES[attackerId];
      const defender = HEROES[defenderId];
      
      if (!attacker || !defender) return COUNTER_TIPS['default'];
      
      const key = `${attacker.role.toLowerCase()}_vs_${defender.role.toLowerCase()}`;
      return COUNTER_TIPS[key] || COUNTER_TIPS['default'];
    }

    let currentFilter = 'all';
    let currentSearch = '';
    let currentView = 'tierlist';
    let currentHero = null;
    let currentTab = 'counters';

    function init() {
      renderAllTiers();
    }

    function showView(viewName, heroId = null) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + viewName).classList.add('active');

        currentHero = HEROES[heroId];

    // Render all tiers
    function renderAllTiers() {
      const container = document.getElementById('tier-container');
      container.innerHTML = '';
      
      ['S', 'A', 'B', 'C'].forEach(tier => {
        const section = createTierSection(tier);
        container.appendChild(section);
      });
    }

    // Create tier section
    function createTierSection(tier) {
      const section = document.createElement('div');
      section.className = 'tier-section';
      section.dataset.tier = tier;
      
      const label = {
        'S': 'Meta Defining',
        'A': 'Strong Picks',
        'B': 'Balanced',
        'C': 'Situational'
      }[tier];
      
      const icon = {
        'S': '🏆',
        'A': '⭐',
        'B': '💫',
        'C': '✨'
      }[tier];
      
      section.innerHTML = `
        <div class="tier-header tier-${tier.toLowerCase()}">
          <span>${icon}</span>
          <span>${tier}-TIER</span>
          <span style="font-size: 0.9rem; font-weight: normal; margin-left: auto;">${label}</span>
        </div>
        <div class="tier-content" id="tier-${tier.toLowerCase()}-content"></div>
      `;
      
      renderTier(tier);
      return section;
    }

    // Render specific tier
    function renderTier(tier) {
      const container = document.getElementById(`tier-${tier.toLowerCase()}-content`);
      const heroes = Object.values(HEROES).filter(h => {
        const matchesTier = h.tier === tier;
        const matchesRole = currentFilter === 'all' || h.role === currentFilter;
        const matchesSearch = currentSearch === '' || 
          h.nameEn.toLowerCase().includes(currentSearch) ||
          (h.nameEnAlt && h.nameEnAlt.toLowerCase().includes(currentSearch)) ||
          h.nameCn.includes(currentSearch) ||
          h.role.toLowerCase().includes(currentSearch);
        return matchesTier && matchesRole && matchesSearch;
      });

      if (heroes.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><p>No heroes found in this tier</p></div>';
        return;
      }

      container.innerHTML = heroes.map(hero => createHeroCard(hero)).join('');
    }

    // Create hero card HTML
    function createHeroCard(hero) {
      const altName = hero.nameEnAlt ? `<div class="hero-name-alt">${hero.nameEnAlt}</div>` : '';
      return `
        <div class="hero-card" onclick="showView('herodetail', '${hero.id}')">
          <div class="hero-avatar">${hero.avatar}</div>
          <div class="hero-name-en">${hero.nameEn}</div>
          ${altName}
          <div class="hero-name-cn">${hero.nameCn}</div>
          <div class="hero-role role-${hero.role.toLowerCase()}">${hero.role}</div>
          <div class="hero-stats">
            <div class="stat-row">
              <span>WR:</span>
              <span style="color: ${hero.winRate >= 50 ? '#4ade80' : '#f87171'}">${hero.winRate}%</span>
            </div>
            <div class="stat-row">
              <span>PR:</span>
              <span>${hero.pickRate}%</span>
            </div>
            <div class="stat-row">
              <span>BR:</span>
              <span>${hero.banRate}%</span>
            </div>
          </div>
        </div>
      `;
    }

    // Filter by role
    function filterByRole(role) {
      currentFilter = role;
      
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelector(`[data-role="${role}"]`).classList.add('active');
      
      ['S', 'A', 'B', 'C'].forEach(tier => renderTier(tier));
    }

    // Filter heroes by search
    function filterHeroes() {
      currentSearch = document.getElementById('search-input').value.toLowerCase();
      ['S', 'A', 'B', 'C'].forEach(tier => renderTier(tier));
    }

    // Render hero detail page
    function renderHeroDetail() {
      if (!currentHero) return;
      
      const h = currentHero;
      const tierClass = `tier-badge-${h.tier.toLowerCase()}`;
      const altNameHtml = h.nameEnAlt ? `<div class="hero-name-alt-large">${h.nameEnAlt}</div>` : '';
      
      // Get available lanes with counters
      const availableLanes = Object.keys(h.counters || {});
      const hasCounters = availableLanes.length > 0;
      
      document.getElementById('hero-detail-content').innerHTML = `
        <div class="hero-header">
          <div class="hero-header-content">
            <div class="hero-avatar-large">${h.avatar}</div>
            <div class="hero-info">
              <div class="hero-names">
                <div class="hero-name-en-large">${h.nameEn}</div>
                ${altNameHtml}
                <div class="hero-name-cn-large">${h.nameCn}</div>
              </div>
              <div class="hero-meta">
                <span class="meta-badge ${tierClass}">${h.tier}-TIER</span>
                <span class="meta-badge role-badge">${h.role}</span>
                <span class="meta-badge role-badge">Difficulty: ${'⭐'.repeat(h.difficulty)}${'☆'.repeat(5-h.difficulty)}</span>
              </div>
              <div class="hero-stats-grid">
                <div class="stat-box">
                  <div class="stat-label">Win Rate</div>
                  <div class="stat-value ${h.winRate >= 52 ? 'good' : h.winRate >= 48 ? '' : 'bad'}">${h.winRate}%</div>
                </div>
                <div class="stat-box">
                  <div class="stat-label">Pick Rate</div>
                  <div class="stat-value">${h.pickRate}%</div>
                </div>
                <div class="stat-box">
                  <div class="stat-label">Ban Rate</div>
                  <div class="stat-value ${h.banRate >= 30 ? 'warning' : ''}">${h.banRate}%</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        ${hasCounters ? renderCountersSection(h, availableLanes) : renderNoCounters()}
      `;
    }

    // Render counters section
    function renderCountersSection(hero, availableLanes) {
      const firstLane = availableLanes[0];
      currentLane = currentLane && availableLanes.includes(currentLane) ? currentLane : firstLane;
      
      const laneButtons = availableLanes.map(lane => {
        const isPrimary = lane === hero.primaryLane.toLowerCase();
        const active = lane === currentLane ? 'active' : '';
        const primaryClass = isPrimary ? 'primary' : '';
        const laneLabel = {
          'jungle': '🌲 Jungle',
          'baron': '👑 Baron',
          'mid': '⭐ Mid',
          'farm': '💰 Farm',
          'roam': '🌍 Roam'
        }[lane] || lane;
        
        return `<button class="lane-btn ${active} ${primaryClass}" onclick="selectHeroLane('${lane}')">${laneLabel}${isPrimary ? ' (Primary)' : ''}</button>`;
      }).join('');

      const counters = hero.counters[currentLane];
      
      return `
        <div class="section-card">
          <div class="section-title">
            <span>🎯</span>
            <span>Lane-Specific Counters</span>
          </div>

          <div class="lane-selector">
            ${laneButtons}
          </div>

          ${renderLaneCounters(hero, currentLane, counters)}
        </div>
      `;
    }

    // Render lane counters
    function renderLaneCounters(hero, lane, counters) {
      if (!counters) return '<p>No counter data available for this lane.</p>';
      
      let html = '';
      
      // Threats
      if (counters.weak && counters.weak.length > 0) {
        html += `
          <div class="counter-section">
            <div class="counter-section-title">
              <span>⚔️</span>
              <span>Heroes That Counter ${hero.nameEn} (${lane.charAt(0).toUpperCase() + lane.slice(1)})</span>
              <span style="margin-left: auto; font-size: 0.9rem; color: #94a3b8;">Pick these against ${hero.nameEn}</span>
            </div>
            <div class="counter-grid">
              ${counters.weak.map(cid => renderCounterCard(cid, 'threat', hero.id)).join('')}
            </div>
          </div>
        `;
      }
      
      // Advantages
      if (counters.strong && counters.strong.length > 0) {
        html += `
          <div class="counter-section">
            <div class="counter-section-title">
              <span>✅</span>
              <span>${hero.nameEn} Strong Against (${lane.charAt(0).toUpperCase() + lane.slice(1)})</span>
              <span style="margin-left: auto; font-size: 0.9rem; color: #94a3b8;">${hero.nameEn} counters these</span>
            </div>
            <div class="counter-grid">
              ${counters.strong.map(cid => renderCounterCard(cid, 'advantage', hero.id)).join('')}
            </div>
          </div>
        `;
      }
      
      return html;
    }

    // Render counter card
    function renderCounterCard(heroId, type, referenceId) {
      const counter = HEROES[heroId];
      if (!counter) return '';
      
      const tip = getCounterTip(type === 'threat' ? heroId : referenceId, type === 'threat' ? referenceId : heroId);
      const altName = counter.nameEnAlt ? `<div class="counter-name-cn" style="color: #60a5fa; font-style: italic;">${counter.nameEnAlt}</div>` : '';
      
      return `
        <div class="counter-card ${type}" onclick="showView('herodetail', '${heroId}')">
          <div class="counter-hero-info">
            <div class="counter-avatar">${counter.avatar}</div>
            <div class="counter-names">
              <div class="counter-name-en">${counter.nameEn}</div>
              ${altName}
              <div class="counter-name-cn">${counter.nameCn}</div>
            </div>
          </div>
          <div class="counter-tip">
            <span class="tip-icon">💡</span>
            ${tip}
          </div>
        </div>
      `;
    }

    // Render no counters placeholder
    function renderNoCounters() {
      return `
        <div class="section-card" style="text-align: center; padding: 40px;">
          <div style="font-size: 3rem; margin-bottom: 20px;">🚧</div>
          <h2 style="margin-bottom: 10px;">Counter Data Coming Soon!</h2>
          <p style="color: #94a3b8;">Counter data for this hero will be added soon.</p>
        </div>
      `;
    }

    // Select hero lane
    function selectHeroLane(lane) {
      currentLane = lane;
      renderHeroDetail();
    }

    // Initialize on load
    init();
  </script>

  <script>

    var DRAFT_HEROES = HEROES;

    function switchTab(tab) {

      if (tab === 'tierlist') {

          initDraft();
          draftInitialized = true;
        }
      }

    function initDraft() {
      console.log('🎮 Initializing draft simulator');
      
      // Create role buttons
      var roleContainer = document.getElementById('role-buttons');
      var roles = ['Tank', 'Fighter', 'Assassin', 'Mage', 'Marksman', 'Support'];
      
      roles.forEach(function(role) {
        var btn = document.createElement('button');
        btn.className = 'role-btn';
        btn.textContent = role;
        btn.onclick = function() { selectRole(role, btn); };
        roleContainer.appendChild(btn);
      });
      
      // Populate enemy dropdowns
      populateEnemyDropdowns();
      
      console.log('✅ Draft initialized with ' + Object.keys(DRAFT_HEROES).length + ' heroes');

        b.classList.remove('active');
      });

      showHeroSelect(role);
      
      // Update suggestions
      updateAnalysis();
      
      console.log('✅ Selected role: ' + role);

      var select = document.createElement('select');
      select.className = 'hero-select';
      select.style.marginTop = '15px';
      
      var defaultOpt = document.createElement('option');
      defaultOpt.value = '';
      defaultOpt.textContent = 'Choose your ' + role;
      select.appendChild(defaultOpt);
      
      roleHeroes.forEach(function(hero) {
        var opt = document.createElement('option');
        opt.value = hero.id;
        opt.textContent = hero.nameEn + ' (' + hero.tier + ')';
        select.appendChild(opt);
      });
      
      container.innerHTML = '';
      container.appendChild(select);
      
      console.log('📦 Showing ' + roleHeroes.length + ' ' + role + ' heroes');
    }
    
    // Populate enemy dropdowns
    function populateEnemyDropdowns() {
      var selects = ['enemy1', 'enemy2', 'enemy3'];
      
      selects.forEach(function(selectId) {
        var select = document.getElementById(selectId);
        
        for (var id in DRAFT_HEROES) {
          var hero = DRAFT_HEROES[id];
          var opt = document.createElement('option');
          opt.value = id;
          opt.textContent = hero.nameEn + ' (' + hero.role + ')';
          select.appendChild(opt);
        }
      });
      
      console.log('✅ Populated enemy dropdowns');
    }
    
    // Update analysis (counter suggestions + build advice)
    function updateAnalysis() {
      var enemyIds = getEnemyIds();
      
      if (selectedRole && enemyIds.length > 0) {
        showCounterSuggestions(selectedRole, enemyIds);
        showBuildAdvice(selectedRole, enemyIds);
      } else {
        document.getElementById('counter-suggestions').innerHTML = '';
        document.getElementById('build-advice').innerHTML = '';
      }
    }
    
    // Get enemy IDs
    function getEnemyIds() {
      var ids = [];
      ['enemy1', 'enemy2', 'enemy3'].forEach(function(selectId) {
        var val = document.getElementById(selectId).value;
        if (val) ids.push(val);
      });
      return ids;
    }
    
    // Show counter suggestions
    function showCounterSuggestions(role, enemyIds) {
      var container = document.getElementById('counter-suggestions');
      
      // Get suggestions
      var suggestions = getCounterSuggestions(role, enemyIds);
      
      if (suggestions.length === 0) {
        container.innerHTML = '<div style="padding: 15px; background: rgba(100,116,139,0.2); border-radius: 8px; color: #94a3b8;">💡 No specific counters found. Pick any strong ' + role + '!</div>';
        return;
      }
      
      var html = '<h4 style="color: #10b981; margin-bottom: 12px;">💡 Counter Suggestions</h4>';
      
      suggestions.slice(0, 5).forEach(function(sug, index) {
        var medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '⭐';
        var hero = DRAFT_HEROES[sug.id];
        
        html += '<div style="background: rgba(51,65,85,0.6); padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid #10b981;">';
        html += '<div style="display: flex; align-items: center; gap: 8px;">';
        html += '<span>' + medal + '</span>';
        html += '<strong style="color: #e2e8f0;">' + hero.nameEn + '</strong>';
        html += '<span style="margin-left: auto; color: #10b981; font-weight: 600;">Score: ' + sug.score + '</span>';
        html += '</div>';
        
        if (sug.counters.length > 0) {
          html += '<div style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px;">';
          sug.counters.forEach(function(cid) {
            html += '<span style="background: rgba(239,68,68,0.2); padding: 3px 8px; border-radius: 6px; font-size: 0.85rem; color: #fca5a5;">✅ Counters ' + DRAFT_HEROES[cid].nameEn + '</span>';
          });
          html += '</div>';
        }
        
        if (hero.tier === 'S' || hero.tier === 'A') {
          html += '<div style="margin-top: 6px;"><span style="background: rgba(251,191,36,0.2); padding: 3px 8px; border-radius: 6px; font-size: 0.85rem; color: #fbbf24;">⭐ ' + hero.tier + '-Tier</span></div>';
        }
        
        html += '</div>';
      });
      
      container.innerHTML = html;
    }
    
    // Get counter suggestions algorithm
    function getCounterSuggestions(role, enemyIds) {
      var roleHeroes = [];
      for (var id in DRAFT_HEROES) {
        if (DRAFT_HEROES[id].role === role) {
          roleHeroes.push(DRAFT_HEROES[id]);
        }
      }
      
      var scored = roleHeroes.map(function(hero) {
        var score = 0;
        var counters = [];
        
        if (hero.counters) {
          for (var lane in hero.counters) {
            var laneCounters = hero.counters[lane];
            if (laneCounters && laneCounters.strong) {
              laneCounters.strong.forEach(function(counteredId) {
                if (enemyIds.indexOf(counteredId) !== -1) {
                  score += 3;
                  if (counters.indexOf(counteredId) === -1) {
                    counters.push(counteredId);
                  }
                }
              });
            }
          }
        }
        
        if (hero.tier === 'S') score += 2;
        if (hero.tier === 'A') score += 1;
        
        return { id: hero.id, score: score, counters: counters };
      });
      
      scored.sort(function(a, b) { return b.score - a.score; });
      
      return scored.filter(function(s) { return s.score > 0; });
    }
    
    // Show build advice
    function showBuildAdvice(role, enemyIds) {
      var container = document.getElementById('build-advice');
      var analysis = analyzeEnemyComp(enemyIds);
      
      var html = '<h4 style="color: #fbbf24; margin-bottom: 12px;">⚔️ Build Advice</h4>';
      
      // Warnings
      if (analysis.warnings.length > 0) {
        html += '<div style="background: rgba(239,68,68,0.15); padding: 12px; border-radius: 8px; border-left: 3px solid #ef4444; margin-bottom: 12px;">';
        html += '<div style="font-weight: 600; color: #ef4444; margin-bottom: 8px;">⚠️ WARNINGS:</div>';
        
        analysis.warnings.forEach(function(w) {
          html += '<div style="margin-bottom: 8px;">';
          html += '<div style="color: #fca5a5; font-weight: 600;">' + w.title + '</div>';
          html += '<div style="color: #e2e8f0; font-size: 0.9rem; margin-top: 4px;">→ ' + w.advice + '</div>';
          if (w.items) {
            html += '<div style="margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px;">';
            w.items.forEach(function(item) {
              html += '<span style="background: rgba(239,68,68,0.2); padding: 3px 8px; border-radius: 6px; font-size: 0.85rem; color: #fca5a5;">' + item + '</span>';
            });
            html += '</div>';
          }
          html += '</div>';
        });
        
        html += '</div>';
      }
      
      // Core build
      var coreBuild = getCoreItems(role);
      html += '<div style="background: rgba(51,65,85,0.6); padding: 12px; border-radius: 8px;">';
      html += '<div style="font-weight: 600; color: #fbbf24; margin-bottom: 8px;">📦 Core Build (' + role + '):</div>';
      html += '<div style="color: #e2e8f0; font-size: 0.9rem; line-height: 1.6;">';
      coreBuild.forEach(function(item, i) {
        html += '<div>' + (i + 1) + '. ' + item + '</div>';
      });
      html += '</div></div>';
      
      container.innerHTML = html;
    }
    
    // Analyze enemy composition
    function analyzeEnemyComp(enemyIds) {
      var enemies = enemyIds.map(function(id) { return DRAFT_HEROES[id]; });
      var warnings = [];
      
      // Healers
      var healers = ['caiyan', 'yao', 'dolia', 'ming', 'guiguzi'];
      var enemyHealers = enemies.filter(function(e) { return healers.indexOf(e.id) !== -1; });
      
      if (enemyHealers.length > 0) {
        warnings.push({
          title: enemyHealers.length === 1 ? '❗ HEALER DETECTED' : '❗❗ MULTIPLE HEALERS',
          advice: 'RUSH ANTI-HEAL ITEMS!',
          items: ['Deadly Blade (Physical)', 'Nightmare Touch (Magical)']
        });
      }
      
      // Multiple tanks
      var tanks = enemies.filter(function(e) { return e.role === 'Tank'; });
      if (tanks.length >= 2) {
        warnings.push({
          title: '❗ MULTIPLE TANKS (' + tanks.length + ')',
          advice: 'Stack Penetration Items',
          items: ['Void Staff', 'Shadow Tomahawk', 'Armor Breaker']
        });
      }
      
      // Multiple mages
      var mages = enemies.filter(function(e) { return e.role === 'Mage'; });
      if (mages.length >= 2) {
        warnings.push({
          title: '❗ MULTIPLE MAGES (' + mages.length + ')',
          advice: 'Build Magic Defense',
          items: ['Athena Buckler', 'Witch Cape', 'Medalion of Troy']
        });
      }
      
      // Multiple assassins
      var assassins = enemies.filter(function(e) { return e.role === 'Assassin'; });
      if (assassins.length >= 2) {
        warnings.push({
          title: '❗ MULTIPLE ASSASSINS (' + assassins.length + ')',
          advice: 'Get Armor + HP',
          items: ['Guardian Armor', 'Thornmail', 'Ominous Premonition']
        });
      }
      
      return { warnings: warnings };
    }
    
    // Core items by role
    function getCoreItems(role) {
      var builds = {
        'Tank': ['Resistance Boots', 'Guardian Armor', 'Ominous Premonition', 'Athena Buckler', 'Thornmail'],
        'Fighter': ['Warrior Boots', 'Shadow Tomahawk', 'Bloodthirsty Sword', 'Frostbite', 'Blade of Despair'],
        'Assassin': ['Boots of Dexterity', 'Jungle Item', 'Shadow Tomahawk', 'Blade of Despair', 'Deadly Blade'],
        'Mage': ['Enchanted Kicks', 'Divine Punishment', 'Blood Drinker', 'Void Staff', 'Staff of Immortal'],
        'Marksman': ['Swift Boots', 'Endless Battle', 'Blade of Despair', 'Critical Strike Item', 'Armor Breaker'],
        'Support': ['Tranquil Boots', 'Support Item', 'Athena Buckler', 'Ominous Premonition', 'Salvation']
      };
      
      return builds[role] || ['No build available'];
    }
  </script>
