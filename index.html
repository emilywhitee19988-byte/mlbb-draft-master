<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLBB Draft Master - Live Stats & Smart Picks</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: 'Rajdhani', sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      min-height: 100vh;
    }
    
    .orbitron { font-family: 'Orbitron', sans-serif; }
    
    /* Glowing effects */
    .glow-gold {
      box-shadow: 0 0 20px rgba(251, 191, 36, 0.3),
                  0 0 40px rgba(251, 191, 36, 0.1);
    }
    
    .glow-blue {
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.3),
                  0 0 40px rgba(59, 130, 246, 0.1);
    }
    
    .glow-red {
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.3),
                  0 0 40px rgba(239, 68, 68, 0.1);
    }
    
    /* Hero card styles */
    .hero-card {
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      border: 2px solid #334155;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    
    .hero-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(251, 191, 36, 0.1), transparent);
      transition: left 0.5s;
    }
    
    .hero-card:hover::before {
      left: 100%;
    }
    
    .hero-card:hover {
      border-color: #fbbf24;
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(251, 191, 36, 0.2);
    }
    
    .hero-card.selected {
      border-color: #3b82f6;
      background: linear-gradient(145deg, #1e3a8a 0%, #1e40af 100%);
    }
    
    .hero-card.banned {
      border-color: #ef4444;
      background: linear-gradient(145deg, #7f1d1d 0%, #991b1b 100%);
      opacity: 0.6;
    }
    
    .hero-img {
      width: 100%;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
    }
    
    /* Draft slot styles */
    .draft-slot {
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      border: 2px dashed #475569;
      min-height: 120px;
      transition: all 0.3s;
    }
    
    .draft-slot.filled {
      border-style: solid;
      border-color: #3b82f6;
    }
    
    .draft-slot.enemy.filled {
      border-color: #ef4444;
    }
    
    /* Role tabs */
    .role-tab {
      background: #1e293b;
      border: 2px solid #334155;
      transition: all 0.2s;
    }
    
    .role-tab:hover {
      border-color: #64748b;
      background: #334155;
    }
    
    .role-tab.active {
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      border-color: #fbbf24;
      color: #0a0e27;
      font-weight: 700;
    }
    
    /* Recommendations */
    .recommendation-card {
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      border-left: 4px solid #10b981;
      transition: all 0.2s;
    }
    
    .recommendation-card:hover {
      transform: translateX(4px);
      border-left-color: #fbbf24;
    }
    
    /* Stats badges */
    .stat-badge {
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.3);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    
    /* Loading animation */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .loading {
      animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    
    /* Tier indicators */
    .tier-s { border-color: #fbbf24 !important; }
    .tier-a { border-color: #10b981 !important; }
    .tier-b { border-color: #3b82f6 !important; }
    .tier-c { border-color: #8b5cf6 !important; }
    .tier-d { border-color: #6b7280 !important; }
    
    /* Tab navigation */
    .tab-btn {
      position: relative;
      padding: 1rem 2rem;
      font-size: 1.125rem;
      font-weight: 600;
      color: #94a3b8;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
      cursor: pointer;
    }
    
    .tab-btn:hover {
      color: #fbbf24;
    }
    
    .tab-btn.active {
      color: #fbbf24;
      border-bottom-color: #fbbf24;
    }
    
    /* Search input */
    .search-input {
      background: rgba(30, 41, 59, 0.6);
      border: 2px solid #334155;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }
    
    .search-input:focus {
      outline: none;
      border-color: #fbbf24;
      box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: #0f172a;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }
  </style>
</head>
<body class="text-white">
  
  <!-- Header -->
  <div class="bg-gradient-to-r from-slate-900 via-slate-800 to-slate-900 border-b-2 border-amber-500 sticky top-0 z-50 backdrop-blur-lg">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="orbitron text-4xl font-black bg-gradient-to-r from-amber-400 via-yellow-300 to-amber-400 bg-clip-text text-transparent">
            MLBB DRAFT MASTER
          </h1>
          <p class="text-sm text-slate-400 mt-1">Real-time ranked data • Smart recommendations</p>
        </div>
        <div class="text-right">
          <div id="last-updated" class="text-sm text-slate-400">Loading data...</div>
          <div id="hero-count" class="text-xs text-amber-400 font-semibold"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 py-6">
    
    <!-- Tab Navigation -->
    <div class="flex border-b border-slate-700 mb-6">
      <button onclick="switchTab('tier-list')" id="tab-tier-list" class="tab-btn active">
        <span>📊</span> Tier List
      </button>
      <button onclick="switchTab('draft-picker')" id="tab-draft-picker" class="tab-btn">
        <span>🎯</span> Draft Picker
      </button>
      <button onclick="switchTab('counters')" id="tab-counters" class="tab-btn">
        <span>⚔️</span> Counters & Synergies
      </button>
    </div>

    <!-- TIER LIST TAB -->
    <div id="content-tier-list" class="tab-content">
      <div class="mb-6">
        <input 
          id="search-tier" 
          type="text" 
          placeholder="🔍 Search heroes by name..." 
          class="search-input w-full rounded-xl px-6 py-4 text-white"
          oninput="filterTierList()"
        >
      </div>
      
      <div class="mb-6">
        <div class="flex gap-3 flex-wrap">
          <button onclick="filterRole('All')" class="role-tab active rounded-lg px-4 py-2 text-sm font-semibold" data-role="All">All Heroes</button>
          <button onclick="filterRole('Tank')" class="role-tab rounded-lg px-4 py-2 text-sm font-semibold" data-role="Tank">🛡️ Tank</button>
          <button onclick="filterRole('Fighter')" class="role-tab rounded-lg px-4 py-2 text-sm font-semibold" data-role="Fighter">⚔️ Fighter</button>
          <button onclick="filterRole('Assassin')" class="role-tab rounded-lg px-4 py-2 text-sm font-semibold" data-role="Assassin">🗡️ Assassin</button>
          <button onclick="filterRole('Mage')" class="role-tab rounded-lg px-4 py-2 text-sm font-semibold" data-role="Mage">✨ Mage</button>
          <button onclick="filterRole('Marksman')" class="role-tab rounded-lg px-4 py-2 text-sm font-semibold" data-role="Marksman">🏹 Marksman</button>
          <button onclick="filterRole('Support')" class="role-tab rounded-lg px-4 py-2 text-sm font-semibold" data-role="Support">💚 Support</button>
        </div>
      </div>
      
      <div id="tier-list-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-3">
        <!-- Heroes will be loaded here -->
      </div>
    </div>

    <!-- DRAFT PICKER TAB -->
    <div id="content-draft-picker" class="tab-content hidden">
      
      <!-- Draft Board -->
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
        
        <!-- Your Team -->
        <div class="lg:col-span-1">
          <div class="bg-gradient-to-br from-blue-900/30 to-blue-950/30 rounded-2xl p-6 border-2 border-blue-500/30">
            <h2 class="text-2xl font-bold text-blue-400 mb-4 flex items-center gap-2">
              <span>🔵</span> Your Team
            </h2>
            <div id="ally-slots" class="space-y-3">
              <!-- Will be populated -->
            </div>
            <button onclick="clearTeam('ally')" class="mt-4 w-full py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm font-semibold transition-colors">
              Clear Team
            </button>
          </div>
        </div>

        <!-- Enemy Team -->
        <div class="lg:col-span-1">
          <div class="bg-gradient-to-br from-red-900/30 to-red-950/30 rounded-2xl p-6 border-2 border-red-500/30">
            <h2 class="text-2xl font-bold text-red-400 mb-4 flex items-center gap-2">
              <span>🔴</span> Enemy Team
            </h2>
            <div id="enemy-slots" class="space-y-3">
              <!-- Will be populated -->
            </div>
            <button onclick="clearTeam('enemy')" class="mt-4 w-full py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm font-semibold transition-colors">
              Clear Team
            </button>
          </div>
        </div>

        <!-- Recommendations -->
        <div class="lg:col-span-1">
          <div class="bg-gradient-to-br from-emerald-900/30 to-emerald-950/30 rounded-2xl p-6 border-2 border-emerald-500/30">
            <h2 class="text-2xl font-bold text-emerald-400 mb-4 flex items-center gap-2">
              <span>⭐</span> Recommendations
            </h2>
            <div id="recommendations" class="space-y-3">
              <p class="text-slate-400 text-sm">Pick heroes to see smart recommendations...</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Hero Pool -->
      <div class="bg-slate-900/50 rounded-2xl p-6 border border-slate-700">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-xl font-bold">Hero Pool</h3>
          <div class="flex gap-2 flex-wrap">
            <button onclick="setDraftRole('All')" class="role-tab active rounded-lg px-3 py-1 text-xs font-semibold" data-draft-role="All">All</button>
            <button onclick="setDraftRole('Tank')" class="role-tab rounded-lg px-3 py-1 text-xs font-semibold" data-draft-role="Tank">Tank</button>
            <button onclick="setDraftRole('Fighter')" class="role-tab rounded-lg px-3 py-1 text-xs font-semibold" data-draft-role="Fighter">Fighter</button>
            <button onclick="setDraftRole('Assassin')" class="role-tab rounded-lg px-3 py-1 text-xs font-semibold" data-draft-role="Assassin">Assassin</button>
            <button onclick="setDraftRole('Mage')" class="role-tab rounded-lg px-3 py-1 text-xs font-semibold" data-draft-role="Mage">Mage</button>
            <button onclick="setDraftRole('Marksman')" class="role-tab rounded-lg px-3 py-1 text-xs font-semibold" data-draft-role="Marksman">MM</button>
            <button onclick="setDraftRole('Support')" class="role-tab rounded-lg px-3 py-1 text-xs font-semibold" data-draft-role="Support">Support</button>
          </div>
        </div>
        
        <input 
          id="search-draft" 
          type="text" 
          placeholder="🔍 Search hero..." 
          class="search-input w-full rounded-xl px-6 py-3 mb-4 text-white"
          oninput="renderDraftPool()"
        >
        
        <div id="draft-pool" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 xl:grid-cols-10 gap-3 max-h-96 overflow-y-auto">
          <!-- Heroes will be loaded here -->
        </div>
      </div>
    </div>

    <!-- COUNTERS TAB -->
    <div id="content-counters" class="tab-content hidden">
      <div class="max-w-4xl mx-auto">
        <div class="bg-slate-900/50 rounded-2xl p-8 border border-slate-700 text-center">
          <h2 class="text-3xl font-bold mb-4">Counter Picks & Synergies</h2>
          <p class="text-slate-400 mb-6">Select a hero to see their counters and best teammates</p>
          
          <input 
            id="search-counter" 
            type="text" 
            placeholder="🔍 Search hero to analyze..." 
            class="search-input w-full rounded-xl px-6 py-4 mb-6 text-white"
            oninput="searchCounterHero()"
          >
          
          <div id="counter-results" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-3 mb-8">
            <!-- Search results -->
          </div>
          
          <div id="counter-analysis" class="hidden">
            <!-- Counter analysis will appear here -->
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Global state
    let heroesData = [];
    let allHeroes = [];
    let currentTierRole = 'All';
    let currentDraftRole = 'All';
    let allyPicks = [];
    let enemyPicks = [];
    let selectedCounterHero = null;

    // Hero roles mapping (comprehensive list)
    const heroRoles = {
      // Tanks
      'Akai': 'Tank', 'Atlas': 'Tank', 'Barats': 'Tank', 'Belerick': 'Tank', 'Baxia': 'Tank',
      'Edith': 'Tank', 'Esmeralda': 'Tank', 'Franco': 'Tank', 'Fredrinn': 'Tank', 'Gatotkaca': 'Tank',
      'Gloo': 'Tank', 'Grock': 'Tank', 'Hilda': 'Tank', 'Hylos': 'Tank', 'Johnson': 'Tank',
      'Khufra': 'Tank', 'Lolita': 'Tank', 'Minotaur': 'Tank', 'Ruby': 'Tank', 'Tigreal': 'Tank',
      'Uranus': 'Tank', 'Aulus': 'Tank', 'Balmond': 'Tank',
      
      // Fighters
      'Aldous': 'Fighter', 'Alpha': 'Fighter', 'Argus': 'Fighter', 'Arlott': 'Fighter', 'Badang': 'Fighter',
      'Bane': 'Fighter', 'Chou': 'Fighter', 'Dyrroth': 'Fighter', 'Freya': 'Fighter', 'Guinevere': 'Fighter',
      'Jawhead': 'Fighter', 'Julian': 'Fighter', 'Khaleed': 'Fighter', 'Lapu-Lapu': 'Fighter', 'Leomord': 'Fighter',
      'Martis': 'Fighter', 'Masha': 'Fighter', 'Minsitthar': 'Fighter', 'Paquito': 'Fighter', 'Phoveus': 'Fighter',
      'Roger': 'Fighter', 'Silvanna': 'Fighter', 'Sun': 'Fighter', 'Terizla': 'Fighter', 'Thamuz': 'Fighter',
      'X.Borg': 'Fighter', 'Yin': 'Fighter', 'Yu Zhong': 'Fighter', 'Zilong': 'Fighter', 'Zhuxin': 'Fighter',
      'Cici': 'Fighter', 'Nolan': 'Fighter',
      
      // Assassins
      'Aamon': 'Assassin', 'Alucard': 'Assassin', 'Benedetta': 'Assassin', 'Fanny': 'Assassin', 'Gusion': 'Assassin',
      'Hanzo': 'Assassin', 'Harley': 'Assassin', 'Hayabusa': 'Assassin', 'Helcurt': 'Assassin', 'Joy': 'Assassin',
      'Karina': 'Assassin', 'Lancelot': 'Assassin', 'Ling': 'Assassin', 'Natalia': 'Assassin', 'Saber': 'Assassin',
      'Selena': 'Assassin', 'Yi Sun-shin': 'Assassin', 'Zilong': 'Assassin', 'Fredrinn': 'Assassin',
      'Nolan': 'Assassin', 'Arlott': 'Assassin',
      
      // Mages
      'Alice': 'Mage', 'Aurora': 'Mage', 'Cecilion': 'Mage', 'Cyclops': 'Mage', 'Eudora': 'Mage',
      'Faramis': 'Mage', 'Gord': 'Mage', 'Harith': 'Mage', 'Kadita': 'Mage', 'Kagura': 'Mage',
      'Kimmy': 'Mage', 'Luo Yi': 'Mage', 'Lunox': 'Mage', 'Lylia': 'Mage', 'Nana': 'Mage',
      'Novaria': 'Mage', 'Odette': 'Mage', 'Pharsa': 'Mage', 'Valentina': 'Mage', 'Vale': 'Mage',
      'Valir': 'Mage', 'Vexana': 'Mage', 'Xavier': 'Mage', 'Yve': 'Mage', 'Zhask': 'Mage',
      'Chang\'e': 'Mage', 'Zhuxin': 'Mage',
      
      // Marksman
      'Beatrix': 'Marksman', 'Brody': 'Marksman', 'Bruno': 'Marksman', 'Claude': 'Marksman', 'Clint': 'Marksman',
      'Edith': 'Marksman', 'Granger': 'Marksman', 'Hanabi': 'Marksman', 'Irithel': 'Marksman', 'Karrie': 'Marksman',
      'Layla': 'Marksman', 'Lesley': 'Marksman', 'Melissa': 'Marksman', 'Miya': 'Marksman', 'Moskov': 'Marksman',
      'Natan': 'Marksman', 'Popol and Kupa': 'Marksman', 'Roger': 'Marksman', 'Wanwan': 'Marksman',
      
      // Support
      'Angela': 'Support', 'Estes': 'Support', 'Diggie': 'Support', 'Rafaela': 'Support', 'Mathilda': 'Support',
      'Floryn': 'Support', 'Chip': 'Support', 'Carmilla': 'Support'
    };

    // Initialize
    async function init() {
      showLoading();
      await fetchHeroData();
      renderTierList();
      renderDraftSlots();
      renderDraftPool();
    }

    function showLoading() {
      document.getElementById('tier-list-grid').innerHTML = '<div class="col-span-full text-center py-12"><div class="loading text-amber-400 text-lg">Loading heroes...</div></div>';
    }

    async function fetchHeroData() {
      try {
        const response = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://mlbb-stats.rone.dev/api/heroes/rank'));
        const data = await response.json();
        
        if (data && data.data && data.data.records) {
          heroesData = data.data.records.map(record => {
            const hero = record.data.main_hero.data;
            return {
              id: hero.id,
              name: hero.name,
              image: hero.head || hero.image,
              winRate: (record.main_hero_win_rate * 100).toFixed(1),
              pickRate: (record.main_hero_pick_rate * 100).toFixed(1),
              banRate: (record.main_hero_ban_rate * 100).toFixed(1),
              rawWin: record.main_hero_win_rate,
              rawPick: record.main_hero_pick_rate,
              rawBan: record.main_hero_ban_rate,
              role: heroRoles[hero.name] || 'Fighter'
            };
          });
          
          // Sort by win rate
          allHeroes = [...heroesData].sort((a, b) => b.rawWin - a.rawWin);
          
          updateStats();
        }
      } catch (error) {
        console.error('Error fetching hero data:', error);
        document.getElementById('last-updated').textContent = 'Failed to load data';
        document.getElementById('tier-list-grid').innerHTML = '<div class="col-span-full text-center py-12 text-red-400">Failed to load hero data. Please refresh the page.</div>';
      }
    }

    function updateStats() {
      const now = new Date();
      document.getElementById('last-updated').textContent = `Updated: ${now.toLocaleTimeString()}`;
      document.getElementById('hero-count').textContent = `${heroesData.length} Heroes`;
    }

    function getTier(winRate) {
      if (winRate >= 54) return 'S';
      if (winRate >= 52) return 'A';
      if (winRate >= 50) return 'B';
      if (winRate >= 48) return 'C';
      return 'D';
    }

    function getTierColor(tier) {
      const colors = {
        'S': 'text-amber-400',
        'A': 'text-emerald-400',
        'B': 'text-blue-400',
        'C': 'text-purple-400',
        'D': 'text-slate-400'
      };
      return colors[tier] || 'text-slate-400';
    }

    function renderTierList() {
      const searchTerm = document.getElementById('search-tier')?.value.toLowerCase() || '';
      
      let filtered = allHeroes.filter(hero => {
        const matchesSearch = hero.name.toLowerCase().includes(searchTerm);
        const matchesRole = currentTierRole === 'All' || hero.role === currentTierRole;
        return matchesSearch && matchesRole;
      });

      const grid = document.getElementById('tier-list-grid');
      
      if (filtered.length === 0) {
        grid.innerHTML = '<div class="col-span-full text-center py-12 text-slate-400">No heroes found</div>';
        return;
      }

      grid.innerHTML = filtered.map(hero => {
        const tier = getTier(parseFloat(hero.winRate));
        const tierColor = getTierColor(tier);
        return `
          <div class="hero-card tier-${tier.toLowerCase()} rounded-xl p-3 cursor-pointer" onclick="showHeroDetails('${hero.name}')">
            <div class="relative">
              <img src="${hero.image}" alt="${hero.name}" class="hero-img mb-2">
              <div class="absolute top-1 right-1 bg-black/70 px-2 py-1 rounded text-xs font-bold ${tierColor}">
                ${tier}
              </div>
            </div>
            <h3 class="font-bold text-sm mb-1 truncate">${hero.name}</h3>
            <div class="flex items-center justify-between text-xs">
              <span class="text-emerald-400 font-semibold">${hero.winRate}%</span>
              <span class="text-slate-400">${hero.role}</span>
            </div>
            <div class="flex gap-1 mt-2">
              <div class="stat-badge flex-1 text-center">
                <div class="text-amber-400">P: ${hero.pickRate}%</div>
              </div>
              <div class="stat-badge flex-1 text-center">
                <div class="text-red-400">B: ${hero.banRate}%</div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function filterTierList() {
      renderTierList();
    }

    function filterRole(role) {
      currentTierRole = role;
      
      // Update active tab
      document.querySelectorAll('[data-role]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.role === role);
      });
      
      renderTierList();
    }

    function setDraftRole(role) {
      currentDraftRole = role;
      
      // Update active tab
      document.querySelectorAll('[data-draft-role]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.draftRole === role);
      });
      
      renderDraftPool();
    }

    function renderDraftSlots() {
      const allyContainer = document.getElementById('ally-slots');
      const enemyContainer = document.getElementById('enemy-slots');
      
      allyContainer.innerHTML = Array(5).fill(0).map((_, i) => `
        <div class="draft-slot rounded-xl p-3 text-center ${allyPicks[i] ? 'filled' : ''}" data-ally-slot="${i}">
          ${allyPicks[i] ? `
            <img src="${allyPicks[i].image}" alt="${allyPicks[i].name}" class="hero-img mx-auto mb-2">
            <p class="font-semibold text-sm">${allyPicks[i].name}</p>
            <p class="text-xs text-slate-400">${allyPicks[i].role}</p>
            <button onclick="removeHero('ally', ${i})" class="mt-2 text-xs text-red-400 hover:text-red-300">Remove</button>
          ` : `
            <div class="text-slate-500 py-6">Empty</div>
          `}
        </div>
      `).join('');
      
      enemyContainer.innerHTML = Array(5).fill(0).map((_, i) => `
        <div class="draft-slot enemy rounded-xl p-3 text-center ${enemyPicks[i] ? 'filled' : ''}" data-enemy-slot="${i}">
          ${enemyPicks[i] ? `
            <img src="${enemyPicks[i].image}" alt="${enemyPicks[i].name}" class="hero-img mx-auto mb-2">
            <p class="font-semibold text-sm">${enemyPicks[i].name}</p>
            <p class="text-xs text-slate-400">${enemyPicks[i].role}</p>
            <button onclick="removeHero('enemy', ${i})" class="mt-2 text-xs text-red-400 hover:text-red-300">Remove</button>
          ` : `
            <div class="text-slate-500 py-6">Empty</div>
          `}
        </div>
      `).join('');
    }

    function renderDraftPool() {
      const searchTerm = document.getElementById('search-draft')?.value.toLowerCase() || '';
      const pool = document.getElementById('draft-pool');
      
      const pickedNames = [...allyPicks, ...enemyPicks].map(h => h?.name);
      
      let filtered = allHeroes.filter(hero => {
        const matchesSearch = hero.name.toLowerCase().includes(searchTerm);
        const matchesRole = currentDraftRole === 'All' || hero.role === currentDraftRole;
        const notPicked = !pickedNames.includes(hero.name);
        return matchesSearch && matchesRole && notPicked;
      });

      pool.innerHTML = filtered.map(hero => `
        <div class="hero-card rounded-lg p-2 cursor-pointer text-center" onclick="selectHeroForDraft('${hero.name}')">
          <img src="${hero.image}" alt="${hero.name}" class="w-full h-16 object-cover rounded mb-1">
          <p class="text-xs font-semibold truncate">${hero.name}</p>
          <p class="text-xs text-emerald-400">${hero.winRate}%</p>
        </div>
      `).join('');
    }

    let draftMode = null; // 'ally' or 'enemy'

    function selectHeroForDraft(heroName) {
      const hero = allHeroes.find(h => h.name === heroName);
      if (!hero) return;
      
      // Ask user which team
      if (confirm(`Add ${hero.name} to:\nOK = Your Team\nCancel = Enemy Team`)) {
        addToTeam('ally', hero);
      } else {
        addToTeam('enemy', hero);
      }
    }

    function addToTeam(team, hero) {
      const picks = team === 'ally' ? allyPicks : enemyPicks;
      const emptySlot = picks.findIndex(p => !p);
      
      if (emptySlot === -1) {
        alert('Team is full!');
        return;
      }
      
      if (team === 'ally') {
        allyPicks[emptySlot] = hero;
      } else {
        enemyPicks[emptySlot] = hero;
      }
      
      renderDraftSlots();
      renderDraftPool();
      updateRecommendations();
    }

    function removeHero(team, index) {
      if (team === 'ally') {
        allyPicks[index] = null;
      } else {
        enemyPicks[index] = null;
      }
      
      renderDraftSlots();
      renderDraftPool();
      updateRecommendations();
    }

    function clearTeam(team) {
      if (team === 'ally') {
        allyPicks = [];
      } else {
        enemyPicks = [];
      }
      
      renderDraftSlots();
      renderDraftPool();
      updateRecommendations();
    }

    function updateRecommendations() {
      const container = document.getElementById('recommendations');
      
      if (allyPicks.filter(Boolean).length === 0 && enemyPicks.filter(Boolean).length === 0) {
        container.innerHTML = '<p class="text-slate-400 text-sm">Pick heroes to see smart recommendations...</p>';
        return;
      }
      
      // Analyze team composition
      const allyRoles = allyPicks.filter(Boolean).map(h => h.role);
      const enemyRoles = enemyPicks.filter(Boolean).map(h => h.role);
      const pickedNames = [...allyPicks, ...enemyPicks].filter(Boolean).map(h => h.name);
      
      // Find missing roles
      const neededRoles = ['Tank', 'Fighter', 'Mage', 'Marksman', 'Support']
        .filter(role => !allyRoles.includes(role));
      
      // Get top heroes by role and win rate
      let recommendations = allHeroes
        .filter(h => !pickedNames.includes(h.name))
        .filter(h => neededRoles.length === 0 || neededRoles.includes(h.role))
        .slice(0, 8);
      
      if (recommendations.length === 0) {
        container.innerHTML = '<p class="text-slate-400 text-sm">All roles filled!</p>';
        return;
      }
      
      container.innerHTML = recommendations.map(hero => `
        <div class="recommendation-card rounded-lg p-3 cursor-pointer" onclick="selectHeroForDraft('${hero.name}')">
          <div class="flex items-center gap-3">
            <img src="${hero.image}" alt="${hero.name}" class="w-12 h-12 rounded object-cover">
            <div class="flex-1">
              <h4 class="font-bold text-sm">${hero.name}</h4>
              <p class="text-xs text-slate-400">${hero.role}</p>
            </div>
            <div class="text-right">
              <p class="text-emerald-400 font-bold text-sm">${hero.winRate}%</p>
              <p class="text-xs text-slate-400">WR</p>
            </div>
          </div>
        </div>
      `).join('');
    }

    function showHeroDetails(heroName) {
      const hero = allHeroes.find(h => h.name === heroName);
      if (!hero) return;
      
      const tier = getTier(parseFloat(hero.winRate));
      alert(`
${hero.name}
━━━━━━━━━━━━━━━━━
Role: ${hero.role}
Tier: ${tier}

Win Rate: ${hero.winRate}%
Pick Rate: ${hero.pickRate}%
Ban Rate: ${hero.banRate}%
      `);
    }

    function searchCounterHero() {
      const searchTerm = document.getElementById('search-counter').value.toLowerCase();
      const results = document.getElementById('counter-results');
      
      if (searchTerm.length < 2) {
        results.innerHTML = '';
        document.getElementById('counter-analysis').classList.add('hidden');
        return;
      }
      
      const filtered = allHeroes.filter(h => h.name.toLowerCase().includes(searchTerm)).slice(0, 12);
      
      results.innerHTML = filtered.map(hero => `
        <div class="hero-card rounded-lg p-2 cursor-pointer text-center" onclick="analyzeHero('${hero.name}')">
          <img src="${hero.image}" alt="${hero.name}" class="w-full h-16 object-cover rounded mb-1">
          <p class="text-xs font-semibold truncate">${hero.name}</p>
          <p class="text-xs text-emerald-400">${hero.winRate}%</p>
        </div>
      `).join('');
    }

    function analyzeHero(heroName) {
      const hero = allHeroes.find(h => h.name === heroName);
      if (!hero) return;
      
      selectedCounterHero = hero;
      
      // Get counters (heroes with higher win rate in different roles)
      const counters = allHeroes
        .filter(h => h.name !== hero.name)
        .filter(h => h.role !== hero.role)
        .sort((a, b) => b.rawWin - a.rawWin)
        .slice(0, 6);
      
      // Get synergies (heroes in complementary roles)
      const synergies = allHeroes
        .filter(h => h.name !== hero.name)
        .filter(h => h.role !== hero.role)
        .sort((a, b) => b.rawWin - a.rawWin)
        .slice(0, 6);
      
      const analysisDiv = document.getElementById('counter-analysis');
      analysisDiv.classList.remove('hidden');
      analysisDiv.innerHTML = `
        <div class="mb-8">
          <div class="flex items-center justify-center gap-4 mb-6">
            <img src="${hero.image}" alt="${hero.name}" class="w-24 h-24 rounded-lg">
            <div class="text-left">
              <h3 class="text-2xl font-bold">${hero.name}</h3>
              <p class="text-slate-400">${hero.role}</p>
              <div class="flex gap-3 mt-2">
                <span class="text-emerald-400 font-semibold">WR: ${hero.winRate}%</span>
                <span class="text-amber-400 font-semibold">Pick: ${hero.pickRate}%</span>
                <span class="text-red-400 font-semibold">Ban: ${hero.banRate}%</span>
              </div>
            </div>
          </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <h4 class="text-xl font-bold mb-4 text-red-400">⚔️ Counter Picks</h4>
            <div class="grid grid-cols-3 gap-3">
              ${counters.map(h => `
                <div class="hero-card rounded-lg p-2 text-center">
                  <img src="${h.image}" alt="${h.name}" class="w-full h-16 object-cover rounded mb-1">
                  <p class="text-xs font-semibold truncate">${h.name}</p>
                  <p class="text-xs text-emerald-400">${h.winRate}%</p>
                </div>
              `).join('')}
            </div>
          </div>
          
          <div>
            <h4 class="text-xl font-bold mb-4 text-blue-400">🤝 Best Synergies</h4>
            <div class="grid grid-cols-3 gap-3">
              ${synergies.map(h => `
                <div class="hero-card rounded-lg p-2 text-center">
                  <img src="${h.image}" alt="${h.name}" class="w-full h-16 object-cover rounded mb-1">
                  <p class="text-xs font-semibold truncate">${h.name}</p>
                  <p class="text-xs text-emerald-400">${h.winRate}%</p>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function switchTab(tabName) {
      // Hide all tabs
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      
      // Show selected tab
      document.getElementById('content-' + tabName).classList.remove('hidden');
      document.getElementById('tab-' + tabName).classList.add('active');
    }

    // Initialize on load
    window.addEventListener('DOMContentLoaded', init);
  </script>

</body>
</html>
