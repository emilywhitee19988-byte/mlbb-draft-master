<html lang="en">

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    
    /* View management */
    .view {
      display: none;
    }
    
    .view.active {
      display: block;
    }
    
    /* Header */
    .header {
      text-align: center;
      margin-bottom: 40px;
      padding: 30px 20px;
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(59, 130, 246, 0.3);
    }
    
    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .header p {
      font-size: 1.1rem;
      color: #bfdbfe;
    }
    
    .patch-info {
      display: inline-block;
      margin-top: 15px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      font-size: 0.9rem;
      backdrop-filter: blur(10px);
    }
    
    /* Back Button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: rgba(30, 41, 59, 0.6);
      border: 2px solid #334155;
      border-radius: 10px;
      color: #e2e8f0;
      text-decoration: none;
      margin-bottom: 20px;
      transition: all 0.3s;
      cursor: pointer;
      border: none;
      font-size: 1rem;
    }
    
    .back-btn:hover {
      background: rgba(51, 65, 85, 0.8);
      border-color: #3b82f6;
    }
    
    /* Controls */
    .controls {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      background: rgba(30, 41, 59, 0.6);
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(148, 163, 184, 0.1);
    }
    
    .search-box {
      flex: 1;
      min-width: 250px;
    }
    
    .search-box input {
      width: 100%;
      padding: 12px 20px;
      border: 2px solid #334155;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.8);
      color: white;
      font-size: 1rem;
      transition: all 0.3s;
    }
    
    .search-box input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    
    .search-box input::placeholder {
      color: #64748b;
    }
    
    .filter-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .filter-btn {
      padding: 10px 20px;
      border: 2px solid #334155;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.8);
      color: #e2e8f0;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
      font-size: 0.9rem;
    }
    
    .filter-btn:hover {
      background: rgba(51, 65, 85, 0.8);
      border-color: #475569;
    }
    
    .filter-btn.active {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      border-color: #3b82f6;
      color: white;
    }
    
    /* Tier Section */
    .tier-section {
      margin-bottom: 30px;
      background: rgba(30, 41, 59, 0.4);
      border-radius: 15px;
      overflow: hidden;
      border: 2px solid rgba(148, 163, 184, 0.1);
    }
    
    .tier-header {
      padding: 15px 25px;
      font-size: 1.5rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .tier-s { background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%); }
    .tier-a { background: linear-gradient(135deg, #ea580c 0%, #f97316 100%); }
    .tier-b { background: linear-gradient(135deg, #eab308 0%, #facc15 100%); color: #0f172a; }
    .tier-c { background: linear-gradient(135deg, #22c55e 0%, #4ade80 100%); }
    
    .tier-content {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 15px;
    }
    
    /* Hero Card */
    .hero-card {
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      border: 2px solid #334155;
      border-radius: 12px;
      padding: 15px;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      position: relative;
    }
    
    .hero-card:hover {
      transform: translateY(-5px);
      border-color: #3b82f6;
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
    }
    
    .hero-avatar {
      width: 80px;
      height: 80px;
      margin: 0 auto 10px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
      background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
      border: 3px solid #475569;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    
    .hero-name-en {
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 3px;
      color: #f1f5f9;
    }
    
    .hero-name-alt {
      font-size: 0.75rem;
      color: #60a5fa;
      margin-bottom: 3px;
      font-style: italic;
    }
    
    .hero-name-cn {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    
    .hero-role {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-top: 5px;
    }
    
    /* Role Colors */
    .role-tank { background: #1e40af; color: white; }
    .role-fighter { background: #dc2626; color: white; }
    .role-assassin { background: #7c3aed; color: white; }
    .role-mage { background: #2563eb; color: white; }
    .role-marksman { background: #ea580c; color: white; }
    .role-support { background: #059669; color: white; }
    
    .hero-stats {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #334155;
      font-size: 0.75rem;
      color: #94a3b8;
    }
    
    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 3px;
    }
    
    /* Hero Detail styles - same as before */
    .hero-header {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);

      padding: 40px;
      margin-bottom: 30px;
      box-shadow: 0 10px 40px rgba(59, 130, 246, 0.3);
    }
    
    .hero-header-content {
      display: flex;
      align-items: center;
      gap: 30px;
      flex-wrap: wrap;
    }
    
    .hero-avatar-large {

      height: 120px;
      border-radius: 50%;

      align-items: center;
      justify-content: center;
      font-size: 4rem;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 5px solid rgba(255,255,255,0.2);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    
    .hero-info {
      flex: 1;
    }
    
    .hero-names {
      margin-bottom: 15px;
    }
    
    .hero-name-en-large {
      font-size: 2.5rem;
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    .hero-name-alt-large {
      font-size: 1.2rem;
      color: #60a5fa;
      font-style: italic;
      margin-bottom: 5px;
    }
    
    .hero-name-cn-large {
      font-size: 1.5rem;
      color: #bfdbfe;
    }

      gap: 15px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .tier-badge-a { background: #ea580c; }
    .tier-badge-b { background: #eab308; color: #0f172a; }
    .tier-badge-c { background: #22c55e; }

      gap: 15px;
      margin-top: 20px;
    }

      padding: 12px;
      border-radius: 10px;
      text-align: center;
    }

      color: #bfdbfe;
      margin-bottom: 5px;
    }

      font-weight: bold;
    }

      margin-bottom: 30px;
      background: rgba(30, 41, 59, 0.6);
      padding: 10px;
      border-radius: 15px;
      overflow-x: auto;

      border: none;
      background: transparent;
      color: #94a3b8;

      border-radius: 10px;
      font-weight: 600;
      transition: all 0.3s;
      white-space: nowrap;

      color: #e2e8f0;
    }
    
    .tab-btn.active {

      display: none;
    }

      font-weight: bold;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

      gap: 10px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

      border-radius: 10px;

    }

      margin-bottom: 15px;

      align-items: center;
      gap: 8px;

    .counter-grid {

      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
    }
    
    .counter-card {

      border-radius: 12px;
      padding: 15px;

    .counter-card.advantage {

    }

      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
      border: 2px solid #475569;
    }

    }
    
    .counter-name-en {
      font-weight: bold;
      font-size: 1rem;
      margin-bottom: 2px;
    }
    
    .counter-name-cn {
      font-size: 0.85rem;
      color: #94a3b8;
    }

      background: rgba(51, 65, 85, 0.5);
      padding: 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #cbd5e1;
      line-height: 1.6;
      white-space: pre-line;
    }
    
    .tip-icon {
      color: #fbbf24;
      margin-right: 5px;

      text-align: center;
      padding: 60px 20px;
      color: #64748b;
    }

      font-size: 4rem;
      margin-bottom: 20px;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.8rem;
      }
      
      .controls {
        flex-direction: column;
      }
      
      .tier-content {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 10px;
      }
      
      .hero-card {
        padding: 12px;
      }
      
      .hero-avatar {
        width: 60px;
        height: 60px;
        font-size: 1.5rem;
      }
      
      .counter-grid {
        grid-template-columns: 1fr;
      }
      
      .hero-header {
        padding: 25px;
      }
      
      .hero-avatar-large {
        width: 80px;
        height: 80px;
        font-size: 2.5rem;
      }
      
      .hero-name-en-large {
        font-size: 1.8rem;
      }
    }

    // ============================================
    // AUTO-GENERATE COUNTERS FOR ALL HEROES
    // Based on role matchups and game mechanics
    // ============================================
    function generateCounters() {
      // Counter rules based on roles and characteristics
      const assassins = Object.values(HEROES).filter(h => h.role === 'Assassin').map(h => h.id);
      const mages = Object.values(HEROES).filter(h => h.role === 'Mage').map(h => h.id);
      const marksmen = Object.values(HEROES).filter(h => h.role === 'Marksman').map(h => h.id);
      const tanks = Object.values(HEROES).filter(h => h.role === 'Tank').map(h => h.id);
      const fighters = Object.values(HEROES).filter(h => h.role === 'Fighter').map(h => h.id);
      const supports = Object.values(HEROES).filter(h => h.role === 'Support').map(h => h.id);

      // Apply counter logic to each hero
      Object.values(HEROES).forEach(hero => {
        if (!hero.counters) {
          hero.counters = {};
        }

        const lanes = [hero.primaryLane.toLowerCase(), ...hero.viableLanes.map(l => l.toLowerCase())];
        
        lanes.forEach(lane => {
          if (!hero.counters[lane]) {
            const weak = [];
            const strong = [];

            // ASSASSINS counter immobile mages/marksmen
            if (hero.role === 'Assassin') {
              strong.push(...mages.filter(m => !['diaochan'].includes(m)).slice(0, 3));
              strong.push(...marksmen.filter(m => !['marcopolo'].includes(m)).slice(0, 2));
              weak.push(...tanks.slice(0, 2));

            // MARKSMEN counter tanks (sustained DPS)
            else if (hero.role === 'Marksman') {
              strong.push(...tanks.slice(0, 2));
              strong.push(...fighters.slice(0, 2));
              weak.push(...assassins.slice(0, 4));
            }

            // TANKS counter assassins (peel)
            else if (hero.role === 'Tank') {
              strong.push(...assassins.slice(0, 3));
              weak.push(...mages.filter(m => ['daji', 'angela', 'ying'].includes(m)));
              weak.push(...marksmen.slice(0, 2));
            }

            // FIGHTERS - balanced matchups
            else if (hero.role === 'Fighter') {
              strong.push(...mages.slice(0, 2));
              strong.push(...marksmen.slice(0, 1));
              weak.push(...tanks.slice(0, 2));
              weak.push(...fighters.filter(f => ['lam', 'augran', 'machao'].includes(f)));
            }

            // SUPPORTS - utility based
            else if (hero.role === 'Support') {
              strong.push(...assassins.slice(0, 2));
              weak.push(...tanks.slice(0, 1));
              weak.push(...mages.filter(m => ['daji', 'angela'].includes(m)));
            }

            // Remove duplicates and self
            hero.counters[lane] = {
              weak: [...new Set(weak)].filter(id => id !== hero.id).slice(0, 4),
              strong: [...new Set(strong)].filter(id => id !== hero.id).slice(0, 4)
            };
          }
        });

      // Role-based general tips
      'tank_vs_assassin': {
        threat: 'High HP and CC shuts down your burst combos.',
        counterplay: '⚔️ HOW TO PLAY: NEVER target tanks first - always ignore them and dash past to backline. Wait for tank to blow CC on your teammate, then engage (CC cooldowns are 8-12s). Build 2-3 penetration items mandatory. Focus on roaming and ganking squishy lanes - don\'t 1v1 tanks ever. If tank zones you, retreat and find another angle - you can\'t kill them.'
      },
      'support_vs_assassin': {
        threat: 'Healing/shields counter your burst. CC prevents escape.',
        counterplay: '⚔️ HOW TO PLAY: KILL THE SUPPORT FIRST before touching carries - remove their protection. Bait CC by fake-engaging then backing off (most supports panic-CC). Buy Anti-Heal item 2nd (cuts healing 50%). Track support cooldowns - heal is usually 10-15s CD, hard CC is 8-12s. After they blow abilities, you have a 5-8 second window to all-in before cooldowns return.'
      },
      'assassin_vs_mage': {
        threat: 'High burst damage. Can one-shot you before you escape.',
        counterplay: '⚔️ HOW TO PLAY: NEVER push past river if enemy mage is missing - they\'re looking for you. Farm under tower when they rotate. Buy Magic Defense boots 1st item (Demon Res 360 gold). SAVE your escape ability - don\'t blow it on minions. Most mages need to land skillshot CC first - dodge sideways, not backward. Their burst combo takes 2-3 seconds - if you survive initial hit, dash away immediately. Rush level 4 before fighting.'
      },
      'assassin_vs_marksman': {
        threat: 'High mobility assassin. Bursts you before you can react.',
        counterplay: '⚔️ HOW TO PLAY: NEVER be alone - stay glued to support/tank (within 2 screen-lengths). Build defensive item 2nd (Dreadstar 2140g or Necklace 2100g). Keep 1 dash ready AT ALL TIMES - never use both dashes to chase. If assassin appears, flash TOWARD your team not away (counterintuitive but correct). Most assassins need 1-2s to burst - kite backward while dealing damage. Position in extreme backline fights - let them dive through your team first.'
      },
      'mage_vs_fighter': {
        threat: 'Gap closers reach you. Out-sustains your poke.',
        counterplay: '⚔️ HOW TO PLAY: Keep distance = 600-700 units (about 1.5 screen widths). When they dash toward you, use CC immediately - don\'t wait. Build Boots of Tranquility (+60 move speed) rush. Poke with max-range abilities but NEVER auto-attack (brings you too close). In teamfights, kite backward in circles - not straight lines. Most fighter dashes are 300-400 range - stay beyond that. If they land on you, flash immediately - don\'t try to fight.'
      },
      'marksman_vs_fighter': {
        threat: 'Gap closers. Dives backline.',
        counterplay: '⚔️ HOW TO PLAY: Position 800+ units back (about 2 screen-lengths behind tank). Attack whoever is CLOSEST - don\'t walk forward to hit carries. Build Dreadstar 2nd item (2140g) for shield. Save mobility spell for when they\'re IN MELEE RANGE - not before. Kite in circles around your tank - use them as a wall. Most fighters have 1 dash (400 range, 10s CD) - if they blow it on someone else, you\'re safe for 10s. Let your tank peel - if you run away from team, you die alone.'
      },
      
      // Generic fallback
      'default': {
        threat: 'Strong matchup based on role advantage.',
        counterplay: '⚔️ HOW TO PLAY: Play safe early game (levels 1-4). Farm under tower if needed - XP more important than gold. If losing lane, roam to help other lanes win. Ask jungle for ganks (ping mini-map). Build 1 defensive item if getting killed repeatedly. Outscale strategy: survive to level 10+, then teamfight. Don\'t fight alone - group with team.'
      }
    };

    function getCounterTip(counterHeroId, yourHeroId, isThreating) {
      const counter = HEROES[counterHeroId];
      const you = HEROES[yourHeroId];
      
      if (!counter || !you) return COUNTER_TIPS['default'];
      
      // PRIORITY 1: Check for detailed hero vs hero matchups
      const detailedMatchupKey = `${yourHeroId}_vs_${counterHeroId}`;
      if (COUNTER_TIPS[detailedMatchupKey]) {
        const tip = COUNTER_TIPS[detailedMatchupKey];
        return isThreating ? tip.threat + '\n\n' + tip.counterplay : tip.threat;
      }
      
      // PRIORITY 2: Check for general hero counter tips
      const specificKey = `${counterHeroId}_counters`;
      if (COUNTER_TIPS[specificKey]) {
        const tip = COUNTER_TIPS[specificKey];
        return isThreating ? tip.threat + '\n\n' + tip.counterplay : tip.threat;
      }
      
      // PRIORITY 3: Fall back to role-based tips
      const roleKey = `${counter.role.toLowerCase()}_vs_${you.role.toLowerCase()}`;
      if (COUNTER_TIPS[roleKey]) {
        const tip = COUNTER_TIPS[roleKey];
        return isThreating ? tip.threat + '\n\n' + tip.counterplay : tip.threat;
      }
      
      // PRIORITY 4: Default generic tip
      return COUNTER_TIPS['default'].threat + '\n\n' + COUNTER_TIPS['default'].counterplay;
    }

    // State
    let currentFilter = 'all';
    let currentSearch = '';
    let currentView = 'tierlist';
    let currentHero = null;
    let currentTab = 'counters';
    let currentLane = null;

    // Initialize
    function init() {
      console.log('Initializing HOK Guide...');
      console.log(`Total heroes loaded: ${Object.keys(HEROES).length}`);
      renderAllTiers();
      console.log('Initialization complete!');
      
      // Remove debug badge
      const debug = document.getElementById('debug');
      if (debug) {
        debug.textContent = 'LOADED ✓';
        setTimeout(() => debug.remove(), 2000);
      }
    }

    // View management
    function showView(viewName, heroId = null) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + viewName).classList.add('active');
      currentView = viewName;

      if (viewName === 'herodetail' && heroId) {
        currentHero = HEROES[heroId];
        renderHeroDetail();
      }
    }

    // Render all tiers
    function renderAllTiers() {
      const container = document.getElementById('tier-container');
      if (!container) {
        console.error('tier-container not found!');
        return;
      }
      container.innerHTML = '';
      
      // Create all tier sections first and append to DOM
      ['S', 'A', 'B', 'C'].forEach(tier => {
        const section = createTierSection(tier);
        container.appendChild(section);
      });
      
      // Now render heroes into the sections (they exist in DOM now)
      ['S', 'A', 'B', 'C'].forEach(tier => {
        renderTier(tier);
      });
    }

    // Create tier section (without rendering heroes yet)
    function createTierSection(tier) {
      const section = document.createElement('div');
      section.className = 'tier-section';
      section.dataset.tier = tier;
      
      const label = {
        'S': 'Meta Defining',
        'A': 'Strong Picks',
        'B': 'Balanced',
        'C': 'Situational'
      }[tier];
      
      const icon = {
        'S': '🏆',
        'A': '⭐',
        'B': '💫',
        'C': '✨'
      }[tier];
      
      section.innerHTML = `
        <div class="tier-header tier-${tier.toLowerCase()}">
          <span>${icon}</span>
          <span>${tier}-TIER</span>
          <span style="font-size: 0.9rem; font-weight: normal; margin-left: auto;">${label}</span>
        </div>
        <div class="tier-content" id="tier-${tier.toLowerCase()}-content"></div>
      `;
      
      return section;
    }

    // Render specific tier
    function renderTier(tier) {
      const container = document.getElementById(`tier-${tier.toLowerCase()}-content`);
      if (!container) {
        console.error(`Container for tier ${tier} not found!`);
        return;
      }
      
      const heroes = Object.values(HEROES).filter(h => {
        const matchesTier = h.tier === tier;
        const matchesRole = currentFilter === 'all' || h.role === currentFilter;
        const matchesSearch = currentSearch === '' || 
          h.nameEn.toLowerCase().includes(currentSearch) ||
          (h.nameEnAlt && h.nameEnAlt.toLowerCase().includes(currentSearch)) ||
          h.nameCn.includes(currentSearch) ||
          h.role.toLowerCase().includes(currentSearch);
        return matchesTier && matchesRole && matchesSearch;
      });

      console.log(`Rendering tier ${tier}: ${heroes.length} heroes found`);

      if (heroes.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><p>No heroes found in this tier</p></div>';
        return;
      }

      container.innerHTML = heroes.map(hero => createHeroCard(hero)).join('');
    }

    // Create hero card HTML
    function createHeroCard(hero) {
      const altName = hero.nameEnAlt ? `<div class="hero-name-alt">${hero.nameEnAlt}</div>` : '';
      const imageUrl = getHeroImageUrl(hero);
      
      return `
        <div class="hero-card" onclick="showView('herodetail', '${hero.id}')">
          <div class="hero-avatar">
            <img src="${imageUrl}" alt="${hero.nameEn}" 
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
                 style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
            <span style="display: none; width: 100%; height: 100%; align-items: center; justify-content: center; font-size: 2rem;">${hero.avatar}</span>
          </div>
          <div class="hero-name-en">${hero.nameEn}</div>
          ${altName}
          <div class="hero-name-cn">${hero.nameCn}</div>
          <div class="hero-role role-${hero.role.toLowerCase()}">${hero.role}</div>
          <div class="hero-stats">
            <div class="stat-row">
              <span>WR:</span>
              <span style="color: ${hero.winRate >= 50 ? '#4ade80' : '#f87171'}">${hero.winRate}%</span>
            </div>
            <div class="stat-row">
              <span>PR:</span>
              <span>${hero.pickRate}%</span>
            </div>
            <div class="stat-row">
              <span>BR:</span>
              <span>${hero.banRate}%</span>
            </div>
          </div>
        </div>
      `;
    }

    // Filter by role
    function filterByRole(role) {
      currentFilter = role;
      
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelector(`[data-role="${role}"]`).classList.add('active');
      
      ['S', 'A', 'B', 'C'].forEach(tier => renderTier(tier));
    }

    // Filter heroes by search
    function filterHeroes() {
      currentSearch = document.getElementById('search-input').value.toLowerCase();
      ['S', 'A', 'B', 'C'].forEach(tier => renderTier(tier));
    }

    // Render hero detail page
    function renderHeroDetail() {
      if (!currentHero) return;
      
      const h = currentHero;
      const tierClass = `tier-badge-${h.tier.toLowerCase()}`;
      const altNameHtml = h.nameEnAlt ? `<div class="hero-name-alt-large">${h.nameEnAlt}</div>` : '';
      const imageUrl = getHeroImageUrl(h);
      
      // Get available lanes with counters
      const availableLanes = Object.keys(h.counters || {});
      const hasCounters = availableLanes.length > 0;
      
      document.getElementById('hero-detail-content').innerHTML = `
        <div class="hero-header">
          <div class="hero-header-content">
            <div class="hero-avatar-large">
              <img src="${imageUrl}" alt="${h.nameEn}" 
                   onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
                   style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
              <span style="display: none; width: 100%; height: 100%; align-items: center; justify-content: center; font-size: 4rem;">${h.avatar}</span>
            </div>
            <div class="hero-info">
              <div class="hero-names">
                <div class="hero-name-en-large">${h.nameEn}</div>
                ${altNameHtml}
                <div class="hero-name-cn-large">${h.nameCn}</div>
              </div>
              <div class="hero-meta">
                <span class="meta-badge ${tierClass}">${h.tier}-TIER</span>
                <span class="meta-badge role-badge">${h.role}</span>
                <span class="meta-badge role-badge">Difficulty: ${'⭐'.repeat(h.difficulty)}${'☆'.repeat(5-h.difficulty)}</span>
              </div>
              <div class="hero-stats-grid">
                <div class="stat-box">
                  <div class="stat-label">Win Rate</div>
                  <div class="stat-value ${h.winRate >= 52 ? 'good' : h.winRate >= 48 ? '' : 'bad'}">${h.winRate}%</div>
                </div>
                <div class="stat-box">
                  <div class="stat-label">Pick Rate</div>
                  <div class="stat-value">${h.pickRate}%</div>
                </div>
                <div class="stat-box">
                  <div class="stat-label">Ban Rate</div>
                  <div class="stat-value ${h.banRate >= 30 ? 'warning' : ''}">${h.banRate}%</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        ${hasCounters ? renderCountersSection(h, availableLanes) : renderNoCounters()}
      `;
    }

    // Render counters section
    function renderCountersSection(hero, availableLanes) {
      const firstLane = availableLanes[0];
      currentLane = currentLane && availableLanes.includes(currentLane) ? currentLane : firstLane;
      
      const laneButtons = availableLanes.map(lane => {
        const isPrimary = lane === hero.primaryLane.toLowerCase();
        const active = lane === currentLane ? 'active' : '';
        const primaryClass = isPrimary ? 'primary' : '';
        const laneLabel = {
          'jungle': '🌲 Jungle',
          'baron': '👑 Baron',
          'mid': '⭐ Mid',
          'farm': '💰 Farm',
          'roam': '🌍 Roam'
        }[lane] || lane;
        
        return `<button class="lane-btn ${active} ${primaryClass}" onclick="selectHeroLane('${lane}')">${laneLabel}${isPrimary ? ' (Primary)' : ''}</button>`;
      }).join('');

      const counters = hero.counters[currentLane];
      
      return `
        <div class="section-card">
          <div class="section-title">
            <span>🎯</span>
            <span>Lane-Specific Counters</span>
          </div>

          <div class="lane-selector">
            ${laneButtons}
          </div>

          ${renderLaneCounters(hero, currentLane, counters)}
        </div>
      `;
    }

    // Render lane counters
    function renderLaneCounters(hero, lane, counters) {
      if (!counters) return '<p>No counter data available for this lane.</p>';
      
      let html = '';
      
      // Threats
      if (counters.weak && counters.weak.length > 0) {
        html += `
          <div class="counter-section">
            <div class="counter-section-title">
              <span>⚔️</span>
              <span>Heroes That Counter ${hero.nameEn} (${lane.charAt(0).toUpperCase() + lane.slice(1)})</span>
              <span style="margin-left: auto; font-size: 0.9rem; color: #94a3b8;">Pick these against ${hero.nameEn}</span>
            </div>
            <div class="counter-grid">
              ${counters.weak.map(cid => renderCounterCard(cid, 'threat', hero.id)).join('')}
            </div>
          </div>
        `;
      }
      
      // Advantages
      if (counters.strong && counters.strong.length > 0) {
        html += `
          <div class="counter-section">
            <div class="counter-section-title">
              <span>✅</span>
              <span>${hero.nameEn} Strong Against (${lane.charAt(0).toUpperCase() + lane.slice(1)})</span>
              <span style="margin-left: auto; font-size: 0.9rem; color: #94a3b8;">${hero.nameEn} counters these</span>
            </div>
            <div class="counter-grid">
              ${counters.strong.map(cid => renderCounterCard(cid, 'advantage', hero.id)).join('')}
            </div>
          </div>
        `;
      }
      
      return html;
    }

    // Render counter card
    function renderCounterCard(heroId, type, referenceId) {
      const counter = HEROES[heroId];
      if (!counter) return '';
      
      // Get tip with counterplay advice (threats get "how to play against" tips)
      const isThreating = type === 'threat';
      const tip = getCounterTip(heroId, referenceId, isThreating);
      const altName = counter.nameEnAlt ? `<div class="counter-name-cn" style="color: #60a5fa; font-style: italic;">${counter.nameEnAlt}</div>` : '';
      const imageUrl = getHeroImageUrl(counter);
      
      return `
        <div class="counter-card ${type}" onclick="showView('herodetail', '${heroId}')">
          <div class="counter-hero-info">
            <div class="counter-avatar">
              <img src="${imageUrl}" alt="${counter.nameEn}" 
                   onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
                   style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
              <span style="display: none; width: 100%; height: 100%; align-items: center; justify-content: center; font-size: 1.5rem;">${counter.avatar}</span>
            </div>
            <div class="counter-names">
              <div class="counter-name-en">${counter.nameEn}</div>
              ${altName}
              <div class="counter-name-cn">${counter.nameCn}</div>
            </div>
          </div>
          <div class="counter-tip">
            <span class="tip-icon">💡</span>
            ${tip}
          </div>
        </div>
      `;
    }

    // Render no counters placeholder
    function renderNoCounters() {
      return `
        <div class="section-card" style="text-align: center; padding: 40px;">
          <div style="font-size: 3rem; margin-bottom: 20px;">🚧</div>
          <h2 style="margin-bottom: 10px;">Counter Data Coming Soon!</h2>
          <p style="color: #94a3b8;">Counter data for this hero will be added soon.</p>
        </div>
      `;
    }

    // Select hero lane
    function selectHeroLane(lane) {
      currentLane = lane;
      renderHeroDetail();
    }

    // Initialize on DOM ready
    console.log('=== HOK GUIDE DEBUG ===');
    console.log('1. Script loaded');
    console.log('2. Total heroes:', Object.keys(HEROES).length);
    console.log('3. Document ready state:', document.readyState);
    
    // Add visible debug on page
    document.body.insertAdjacentHTML('afterbegin', '<div id="debug" style="position:fixed;top:10px;right:10px;background:red;color:white;padding:10px;z-index:9999;border-radius:5px;">LOADING...</div>');
    
    if (document.readyState === 'loading') {
      console.log('4. Waiting for DOMContentLoaded');
      document.addEventListener('DOMContentLoaded', function() {
        console.log('5. DOM loaded, calling init()');
        document.getElementById('debug').textContent = 'INITIALIZING...';
        init();
      });
    } else {
      console.log('4. DOM already loaded, calling init() now');
      document.getElementById('debug').textContent = 'INITIALIZING...';
      init();
    }
  </script>
</body>
</html>
